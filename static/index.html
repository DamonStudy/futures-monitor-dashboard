    function renderAccordionBlock(title, subtitle, body, open = false, available = true) {
      return `
        <details class="pillar-section" ${open ? "open" : ""}>
          <summary class="pillar-summary">
            <div class="pillar-summary-main">
              <strong>${e(title)}</strong>
              <span class="pillar-summary-sub">${e(subtitle || "")}</span>
            </div>
          </summary>
          <div class="pillar-body">${body}</div>
        </details>
      `;
    }

    function renderTermStructureBody(skill) {
      if (!skill) return `<div class="pillar-empty">暂无期限结构数据。</div>`;
      const available = skill.status !== "unavailable" && ((skill.tables || []).length || (skill.charts || []).length);
      if (!available) {
        return `${renderNotes(skill.notes)}<div class="pillar-empty">${e(skill.summary || "暂无足够合约链报价。")}</div>`;
      }
      const tables = skill.tables || [];
      const spreadTable = tables.find(item => item.title === "跨期价差");
      const chainTable = tables.find(item => item.title === "合约链报价");
      const chart = (skill.charts || []).find(item => item.type === "line");
      return `
        ${renderSignalCardGrid(skill.signals, 4, "")}
        ${spreadTable ? renderTermSpreadCards(spreadTable) : ""}
        ${chainTable ? renderTermChainTable(chainTable) : ""}
        ${chart ? `
          <div class="term-curve-panel">
            <div class="group-title">${e(chart.title || "期限结构曲线")}</div>
            <canvas id="term-curve-chart" class="mini-chart"></canvas>
          </div>
        ` : ""}
        ${renderNotes(skill.notes)}
      `;
    }

    function renderTermSpreadCards(spreadTable) {
      const rows = spreadTable.rows || [];
      if (!rows.length) return "";
      return `
        <div class="term-spread-section">
          <div class="zone-title">跨期价差</div>
          <div class="card-grid term-spread-grid">${rows.map(row => `
            <div class="signal-card watch">
              <div class="signal-card-title"><span>${e(row["价差"] || "-")}</span></div>
              <div class="signal-desc">${e(row["近端"] || "-")} → ${e(row["远端"] || "-")}</div>
              <div class="chips">
                <span class="chip info">${e(formatCell(row["点差"]))}</span>
                <span class="chip warning">${e(row["价差率"] || "-")}</span>
              </div>
            </div>
          `).join("")}</div>
        </div>
      `;
    }

    function renderTermChainTable(chainTable, maxRows = 5) {
      const columns = chainTable.columns || [];
      const allRows = chainTable.rows || [];
      if (!columns.length || !allRows.length) return "";
      const rows = allRows.slice(0, maxRows);
      const hidden = allRows.length - rows.length;
      return `
        <div class="term-chain-section">
          <div class="zone-title">合约链报价</div>
          <div class="table-wrap" aria-label="合约链报价">
            <table>
              <thead><tr>${columns.map(col => `<th>${e(col)}</th>`).join("")}</tr></thead>
              <tbody>
                ${rows.map(row => `<tr>${columns.map(col => `<td>${formatTableCell(col, row[col])}</td>`).join("")}</tr>`).join("")}
              </tbody>
            </table>
            ${hidden > 0 ? `<div class="table-more">另有 ${hidden} 个合约未展示。</div>` : ""}
          </div>
        </div>
      `;
    }

    function bindTermStructureChart(skill) {
      const canvas = document.getElementById("term-curve-chart");
      if (!canvas) return;
      const chart = (skill.charts || []).find(item => item.type === "line");
      if (!chart) return;
      const draw = () => drawTermCurve(canvas, chart.points || []);
      const details = canvas.closest("details.pillar-section");
      if (!details) {
        draw();
        return;
      }
      if (!details.dataset.termChartBound) {
        details.dataset.termChartBound = "1";
        details.addEventListener("toggle", () => {
          if (details.open) draw();
        });
      }
      if (details.open) draw();
    }

    function bindKlinePanel(item) {
      const canvas = document.getElementById("kline");
      if (!canvas) return;
      const draw = () => drawKline(canvas, (item.charts || {})[state.period] || []);
      const details = canvas.closest("details.pillar-section");
      if (!details) {
        draw();
        return;
      }
      if (!details.dataset.klineBound) {
        details.dataset.klineBound = "1";
        details.addEventListener("toggle", () => {
          if (details.open) draw();
        });
      }
      if (details.open) draw();
    }

    function matrixPeriods(matrix) {
      return (matrix.periods || []).filter(period => period.key !== "hour");
    }

    function renderDirectionMatrix(item) {
      const matrix = item.direction_matrix;
      if (!matrix || !Array.isArray(matrix.cells) || !matrix.cells.length) return "";
      const periods = matrixPeriods(matrix);
      if (!periods.length) return "";
      const dimensions = matrix.dimensions || [];
      const active = activeMatrixCell(matrix, periods);
      const columns = Math.max(periods.length + 1, 2);
      const gridStyle = `grid-template-columns: 72px repeat(${periods.length}, 68px);`;
      return `
        <section class="evidence-card">
          <div class="module-head">
            <h3>多周期方向矩阵</h3>
          </div>
          <div class="matrix-layout">
            <div class="matrix-panel matrix-scroll">
              <div class="matrix-table" style="${gridStyle}">
                <div class="matrix-label"></div>
                ${periods.map(period => `<div class="matrix-label matrix-head">${e(period.label)}</div>`).join("")}
                ${dimensions.map(dimension => `
                  <div class="matrix-label">${e(dimension.label)}</div>
                  ${periods.map(period => renderMatrixCell(cellFor(matrix, period.key, dimension.key), active)).join("")}
                `).join("")}
              </div>
            </div>
            ${renderMatrixExplain(active)}
          </div>
        </section>
      `;
    }

    function activeMatrixCell(matrix, periods = matrixPeriods(matrix)) {
      const cells = matrix.cells || [];
      const allowed = new Set(periods.map(period => period.key));
      const selected = state.matrixCell
        ? cells.find(cell => cell.period === state.matrixCell.period && cell.dimension_key === state.matrixCell.dimension)
        : null;
      if (selected && allowed.has(selected.period)) return selected;
      return (
        cells.find(cell => allowed.has(cell.period) && cell.bias !== "neutral")
        || cells.find(cell => cell.period === "day" && cell.dimension_key === "trend")
        || cells.find(cell => allowed.has(cell.period))
        || cells[0]
      );
    }

    function cellFor(matrix, period, dimension) {
      return (matrix.cells || []).find(cell => cell.period === period && cell.dimension_key === dimension) || {
        period,
        dimension_key: dimension,
        bias: "neutral",
        label: "中立",
        summary: "暂无数据。",
        reasons: [],
      };
    }

    function renderMatrixCell(cell, active) {
      const isActive = active && active.period === cell.period && active.dimension_key === cell.dimension_key;
      return `
        <button
          class="matrix-cell ${e(cell.bias || "neutral")} ${isActive ? "active" : ""}"
          title="${e(cell.summary || "")}"
          onclick="selectMatrixCell('${e(cell.period)}', '${e(cell.dimension_key)}')"
        >${e(cell.label || "中立")}</button>
      `;
    }

    function selectMatrixCell(period, dimension) {
      state.matrixCell = { period, dimension };
      renderCurrent();
    }

    function renderMatrixExplain(cell) {
      if (!cell) return "";
      return `
        <div class="matrix-explain">
          <div class="matrix-explain-title">
            <h3>${e(cell.period_label || periodName(cell.period))} / ${e(cell.dimension || "-")}</h3>
            <span class="${chipClassForBias(cell.bias)}">${e(cell.label || "中立")}</span>
          </div>
          <p class="module-sub">${e(cell.summary || "暂无解释。")}</p>
          ${(cell.reasons || []).length ? `<ul class="reason-list">${cell.reasons.map(reason => `<li>${e(reason)}</li>`).join("")}</ul>` : ""}
        </div>
      `;
    }

    function renderMacroBar(macro, embedded = false) {
      if (!macro || macro.status === "unavailable") return "";
      const body = renderMacroBarBody(macro);
      if (embedded) return body;
      return `<section class="macro-bar">${body}</section>`;
    }

    function renderMacroBarBody(macro) {
      const snapshot = macro.snapshot || {};
      const calendar = macro.calendar || {};
      const drivers = Object.fromEntries((snapshot.drivers || []).map(row => [row.id, row]));
      const us10y = drivers.us10y;
      const next = calendar.next_event;
      const parts = [];
      if (us10y) parts.push(`10Y ${e(us10y.value_label || us10y.latest_value)}`);
      if (next) parts.push(`下一事件 ${e(next.date)} ${e(next.time)} ${e(next.title)}`);
      if (calendar.risk_window_48h) parts.push("48h 内有重要数据");
      const events = (calendar.upcoming || []).slice(0, 5);
      return `
        <div class="macro-bar-head">
          <h3>宏观窗口</h3>
          <span class="subtle">更新 ${e(macro.refreshed_at || "-")}</span>
        </div>
        <p class="macro-bar-lead">${parts.length ? parts.join(" · ") : "宏观快照已更新"}</p>
        ${events.length ? `<ul class="macro-event-list">${events.map(ev => `
          <li><span class="k">${e(ev.date)} ${e(ev.time)}</span> ${e(ev.region)} · ${e(ev.title)}</li>
        `).join("")}</ul>` : ""}
      `;
    }

    function boardLabel(item) {
      return item?.nanhua_board || item?.board || "未分类";
    }

    function boardTagTitle(item) {
      const code = item?.nanhua_index_code;
      const internal = item?.board;
      if (code && internal && internal !== boardLabel(item)) {
        return `${boardLabel(item)}（${code}）· 内部分组 ${internal}`;
      }
      if (code) return `${boardLabel(item)}（${code}）`;
      return boardLabel(item);
    }

    function renderDetailHeader(item) {
      const m = item.metrics || {};
      const retClass = Number(m.return_pct) > 0 ? "up" : Number(m.return_pct) < 0 ? "down" : "";
      return `
        <section class="detail-header evidence-card">
          <div class="detail-header-main">
            <div class="hero-title">
              <h2>${e(item.name)}</h2>
              <span class="hero-symbol">${e(item.actual_symbol || item.symbol || "-")}</span>
            </div>
            <div class="chips">
              <span class="pill" title="${e(boardTagTitle(item))}">${e(boardLabel(item))}${item.nanhua_index_code ? ` · ${e(item.nanhua_index_code)}` : ""}</span>
              <span class="pill">主力合约</span>
              <span class="pill" title="${e(sessionDetail(item))}">${e(sessionLabel(item))}</span>
              <span class="${chipClassForDirection(item.direction)}">${directionText(item.direction)}</span>
            </div>
          </div>
          <div class="detail-header-metrics">
            ${metric("最新价", formatCell(item.last_price ?? m.close), `${pct(m.return_pct)} · ${shortQuoteTime(item.quote_time)}`, "", retClass)}
            ${metric("开仓保证金", `${money(m.estimated_margin)}/手`, `合约价值 ${money(m.contract_value)} · 乘数 ${spec(m.volume_multiple)}`)}
            ${metric("波动幅度", `${money(m.avg_daily_range_amount_5d)}/日`, `日内振幅 ${pct(m.range_pct)} · 一跳 ${money(m.tick_value)}`)}
          </div>
        </section>
      `;
    }

    function renderInsight(insightSkill, item) {
      if (!insightSkill) return "";
      const direction = directionText(item.direction);
      const brief = insightSkill.brief || legacySummaryBrief(insightSkill, item, direction);
      const hits = filterProductInsightHits(insightSkill.core_hits || []).slice(0, 4);
      const score = insightSkill.priority ?? item.score ?? "-";
      const headline = cleanInsightHeadline(brief.headline || `${item.state || ""} · ${item.level || ""}`, direction, score);
      const hitBlocks = renderInsightHits(hits, brief);
      const summaryNote = insightSkill.judgment_note || buildInsightJudgmentNote(hits);
      const body = hitBlocks || "";

      return `
        <section class="decision-band insight-block">
          <div class="decision-headline-row">
            <p class="insight-lead decision-headline">${e(headline)}</p>
            <span class="${chipClassForDirection(item.direction)}">${directionText(item.direction)}</span>
          </div>
          ${body || `<p class="insight-line"><span class="k">提示</span><span>暂无解读，请刷新数据。</span></p>`}
          ${summaryNote ? `<p class="insight-summary">${e(summaryNote)}</p>` : ""}
        </section>
      `;
    }

    function buildInsightJudgmentNote(hits) {
      if (!hits.length) return "";
      const names = hits.slice(0, 3).map(hit => shortHitName(hit.name)).filter(Boolean).join("、");
      return `已命中 ${hits.length} 项${names ? `（${names}）` : ""}，当前以盘面与品种逻辑为主。`;
    }

    function filterProductInsightHits(hits) {
      const macroPattern = /非农|ISM|GDP|CPI|PPI|国债收益率|中间价|FOMC|宏观环境|宏观·/;
      return (hits || []).filter(hit => {
        const text = `${hit.name || ""} ${hit.text || ""}`;
        return !macroPattern.test(text);
      });
    }

    function cleanInsightHeadline(headline, direction, score) {
      return String(headline || "")
        .replace(/\s*·\s*方向(偏多|偏空|中性)/g, "")
        .replace(/\s*·\s*关注分\s*\d+/g, "")
        .replace(/^[\s·]+|[\s·]+$/g, "")
        .trim() || `方向${direction}`;
    }

    function renderInsightHits(hits, brief) {
      if (hits.length) {
        return `
          <div class="insight-lines">
            <ul class="insight-hit-list">
              ${hits.map(hit => `
                <li class="insight-hit-item">
                  <span class="insight-hit-name">${e(shortHitName(hit.name))}</span>
                  ${hit.text ? `<span class="insight-hit-desc">${e(clip(hit.text, 72))}</span>` : ""}
                </li>
              `).join("")}
            </ul>
          </div>
        `;
      }
      const fallback = (brief.evidence || [])
        .filter(text => !/非农|ISM|GDP|CPI|宏观/.test(String(text)))
        .slice(0, 3);
      if (fallback.length) {
        return renderInsightPlainList(fallback.map(text => clip(text, 72)));
      }
      const triggers = (brief.triggers || [])
        .filter(text => !/macro_regime|宏观环境/.test(String(text)))
        .slice(0, 3);
      if (triggers.length) {
        return renderInsightPlainList(triggers.map(text => clip(text, 72)));
      }
      return "";
    }

    function renderInsightTagList(items, label) {
      if (!items.length) return "";
      return `
        <div class="insight-lines">
          <p class="group-title insight-section-label">${e(label)}</p>
          <ul class="insight-tag-list">
            ${items.map(text => `<li><span>${e(text)}</span></li>`).join("")}
          </ul>
        </div>
      `;
    }

    function renderInsightPlainList(items) {
      if (!items.length) return "";
      return `
        <div class="insight-lines">
          <ul class="insight-tag-list">
            ${items.map(text => `<li><span>${e(text)}</span></li>`).join("")}
          </ul>
        </div>
      `;
    }

    function legacyInsightSkill(summarySkill, lensSkill, item) {
      if (!summarySkill && !lensSkill) return null;
      const lens = normalizeResearchLens(lensSkill);
      const direction = directionText(item?.direction);
      const brief = summarySkill?.brief || legacySummaryBrief(summarySkill || {}, item || {}, direction);
      return {
        brief,
        core_hits: lens?.core_hits || [],
        gaps: lens?.gaps || [],
        judgment_note: lens?.judgment_note || summarySkill?.judgment_note || "",
        priority: summarySkill?.priority ?? item?.score,
      };
    }

    function compactGap(text) {
      const raw = String(text || "");
      if (!raw) return "";
      const head = raw.split("：")[0].split("·").slice(-1)[0] || raw;
      if (raw.includes("未接入")) return `${head}未接入`;
      if (raw.includes("无对应盘面")) return `${head}待验证`;
      return clip(raw.replace(/·/g, "/"), 36);
    }

    function clip(text, max = 36) {
      const value = String(text || "");
      return value.length > max ? `${value.slice(0, max)}…` : value;
    }

    function legacySummaryBrief(skill, item, direction) {
      return {
        headline: `${item.state || ""} · ${item.level || ""}`,
        triggers: (skill.signals || []).slice(0, 3).map(sig => sig.name).filter(Boolean),
        evidence: [],
        framework: [],
        verify: [],
      };
    }

    function normalizeResearchLens(skill) {
      if (!skill || skill.status === "unavailable") return null;
      const normalized = { ...skill };
      if (!Array.isArray(normalized.core_hits) || !normalized.core_hits.length) {
        normalized.core_hits = (normalized.signals || []).slice(0, 5).map(sig => ({
          name: sig.name,
          text: String(sig.interpretation || "").split("（")[0].trim() || sig.interpretation || "",
          level: sig.level || "info",
          value: sig.value,
        }));
      }
      if (!Array.isArray(normalized.gaps)) normalized.gaps = [];
      if (!normalized.judgment_note && normalized.core_hits?.length && !normalized.gaps.length) {
        normalized.judgment_note = "当前以盘面证据为主；如需基本面闭环，请刷新数据或补充产业数据。";
      }
      if (!normalized.judgment_note && !normalized.core_hits?.length) {
        normalized.judgment_note = "暂无结构化思维链，请点击「刷新数据」重新生成。";
      }
      return normalized;
    }

    function renderKlineSection() {
      return `
        <div class="kline-panel">
          <div class="chart-head">
            <div class="chart-tools">
              <div class="ma-legend">
                <span class="ma-key"><i class="ma-line"></i>MA20</span>
                <span class="ma-key"><i class="ma-line ma60"></i>MA60</span>
              </div>
              <div class="tabs">
                ${tab("day", "日线")}
                ${tab("week", "周线")}
              </div>
            </div>
          </div>
          <canvas id="kline"></canvas>
        </div>
      `;
    }

    function shortHitName(name) {
      const parts = String(name || "").split("·");
      return parts[parts.length - 1] || name || "-";
    }

    function renderMacroRegime(skill) {
      if (!skill || skill.status === "unavailable") return "";
      return `
        <div class="module">
          ${moduleHead(skill)}
          <p class="module-sub">${e(skill.summary || "")}</p>
          ${renderSignalGroups(skill.signals)}
          ${renderTables(skill.tables)}
          ${renderNotes(skill.notes)}
        </div>
      `;
    }

    function renderPriceVolume(skill) {
      if (!skill) return "";
      return `
        <div class="module">
          ${moduleHead(skill)}
          <p class="module-sub">${e(skill.summary || "")}</p>
          ${renderSignalGroups(skill.signals)}
        </div>
      `;
    }

    function renderTechnical(skill) {
      if (!skill) return "";
      const rows = (skill.signals || []).slice(0, 6);
      return `
        <div class="module">
          ${moduleHead(skill)}
          <p class="module-sub">${e(skill.summary || "")}</p>
          <div class="card-grid">
            ${rows.length ? rows.map(sig => renderSignalCard(sig)).join("") : emptySmall("暂无明显技术指标阈值信号。")}
          </div>
          ${renderNotes(skill.notes)}
        </div>
      `;
    }

    function renderPatterns(skill) {
      if (!skill) return "";
      const rows = (skill.signals || []).slice(0, 6);
      return `
        <div class="module">
          ${moduleHead(skill)}
          <p class="module-sub">${e(skill.summary || "")}</p>
          <div class="signal-groups">
            ${rows.length ? rows.map(renderPatternCard).join("") : emptySmall("暂无显著K线形态。")}
          </div>
          ${renderNotes(skill.notes)}
        </div>
      `;
    }

    function renderKeyLevels(skill) {
      if (!skill) return "";
      const rows = nearestLevels(skill.levels || []);
      return `
        <div class="module">
          ${moduleHead(skill)}
          <div class="level-grid">
            ${rows.length ? rows.map(renderLevel).join("") : emptySmall("暂无关键点位。")}
          </div>
        </div>
      `;
    }

    function renderGenericModules(skills) {
      const dedicatedAnalyzers = new Set([
        "price_volume", "board_resonance", "seasonality", "technical_signals", "candlestick_patterns", "key_levels", "term_structure", "macro_regime",
      ]);
      return skills.filter(skill => skill.kind === "analyzer" && !dedicatedAnalyzers.has(skill.id)).map(skill => `
        <div class="module">
          ${moduleHead(skill)}
          <p class="module-sub">${e(skill.summary || "")}</p>
          ${renderSignalGroups(skill.signals)}
          ${renderNotes(skill.notes)}
        </div>
      `).join("");
    }

    function renderDetailTables(tables) {
      if (!tables.length) return "";
      return tables.map(table => `
        <section>
          <div class="module-head"><h3>${e(table.title || "数据表")}</h3></div>
          ${renderTable(table)}
        </section>
      `).join("");
    }

    function renderTermStructure(skill) {
      if (!skill) return "";
      const available = skill.status !== "unavailable" && ((skill.tables || []).length || (skill.charts || []).length);
      return `
        <section class="term-card ${available ? "available" : ""}">
          <div class="module-head">
            <h3>${e(skill.title || "期限结构")}</h3>
            <span class="chip ${available ? "info" : ""}">${available ? "已启用" : "暂无数据"}</span>
          </div>
          <p class="module-sub">${e(skill.summary || "暂无足够合约链报价，先不判断期限结构。")}</p>
          ${available ? renderSignalGroups(skill.signals) + renderTables(skill.tables) + renderCharts(skill) : renderNotes(skill.notes)}
        </section>
      `;
    }

    function tab(period, label) {
      return `<button class="tab ${state.period === period ? "active" : ""}" onclick="setPeriod('${period}')">${label}</button>`;
    }

    function metric(label, value, sub, klass = "", subKlass = "") {
      return `
        <div class="metric">
          <div class="label">${e(label)}</div>
          <div class="value ${klass}">${e(value ?? "-")}</div>
          <div class="sub ${subKlass}">${e(sub || "")}</div>
        </div>
      `;
    }

    function shortQuoteTime(text) {
      if (!text) return "更新未知";
      const raw = String(text);
      const match = raw.match(/(\d{4}-\d{2}-\d{2})/);
      if (match) return match[1];
      return raw.slice(0, 16);
    }

    function moduleHead(skill) {
      return `
        <div class="module-head">
          <h3>${e(skill.title || "-")}</h3>
          <span class="${chipClass(scoreLevel(skill.priority))}">${e(skill.priority ?? "-")}</span>
        </div>
      `;
    }

    const SIGNAL_PERIODS = new Set(["day", "week"]);

    function filterSignalsByPeriod(signals) {
      return (signals || []).filter(sig => !sig.period || SIGNAL_PERIODS.has(sig.period));
    }

    function sortSignalsByPeriod(signals) {
      const order = { day: 0, week: 1 };
      return [...signals].sort((a, b) => (order[a.period] ?? 9) - (order[b.period] ?? 9));
    }

    function levelsForDisplay(levels) {
      const rows = (levels || []).filter(row => row.period !== "hour");
      const dayRows = rows.filter(row => row.period === "day" || row.period_label === "日线");
      if (dayRows.length) return dayRows;
      return rows.filter(row => row.period === "week" || row.period_label === "周线");
    }

    function renderSignalCardGrid(signals, limit = 6, emptyText = "") {
      const all = sortSignalsByPeriod(filterSignalsByPeriod(signals));
      const rows = all.slice(0, limit);
      if (!rows.length) return emptyText ? emptySmall(emptyText) : "";
      const hidden = all.length - rows.length;
      return `
        <div class="card-grid">${rows.map(renderSignalCard).join("")}</div>
        ${hidden > 0 ? `<div class="table-more">另有 ${hidden} 个信号未展示。</div>` : ""}
      `;
    }

    function renderSignalGroups(signals, limit = 6) {
      return renderSignalCardGrid(signals, limit);
    }

    function shortSignalDesc(sig) {
      const text = String(sig.interpretation || "").split("（")[0].trim() || sig.interpretation || "";
      return clip(text, 52);
    }

    function renderSignalLine(sig) {
      const valueParts = [];
      if (sig.value !== null && sig.value !== undefined) valueParts.push(formatCell(sig.value));
      if (sig.threshold) valueParts.push(sig.threshold);
      return `
        <div class="signal-line">
          <i class="dot" style="background:${signalColor(sig)}"></i>
          <span class="signal-name">${e(sig.name || "-")}</span>
          <span class="signal-desc">${e(shortSignalDesc(sig))}</span>
          <span class="signal-value">${e(valueParts.join(" · ") || "")}</span>
        </div>
      `;
    }

    function renderSignalCard(sig) {
      return `
        <div class="signal-card ${signalTone(sig)}">
          <div class="signal-card-title">
            <span>${e(sig.name || "-")}</span>
            ${sig.period ? `<span class="chip">${periodName(sig.period)}</span>` : ""}
          </div>
          <div class="signal-desc">${e(sig.interpretation || "")}</div>
          <div class="chips">
            ${sig.value !== null && sig.value !== undefined ? `<span class="chip info">${e(formatCell(sig.value))}</span>` : ""}
            ${sig.threshold ? `<span class="chip warning">${e(sig.threshold)}</span>` : ""}
          </div>
        </div>
      `;
    }

    function renderPatternCard(sig) {
      const bull = patternDirection(sig) === "bull";
      return `
        <div class="pattern-card ${bull ? "bull" : "bear"}">
          <div class="pattern-title">
            <span>${e(sig.name || "-")}</span>
            <span class="chip ${bull ? "danger" : "success"}">${bull ? "偏多" : "偏空"}</span>
          </div>
          <div class="signal-desc">${e(sig.interpretation || "")}</div>
          <div class="subtle">${periodName(sig.period)}${sig.value !== null && sig.value !== undefined ? ` · ${e(sig.value)}` : ""}</div>
        </div>
      `;
    }

    function renderLevel(level) {
      const type = level.type || "confirm";
      return `
        <div class="level-item ${e(type)}">
          <div>
            <span class="type-pill ${levelTypeClass(type)}">${levelTypeName(type)}</span>
            <div class="level-price">${e(formatCell(level.price))}</div>
            <div class="subtle ellipsis">${e(level.period_label || periodName(level.period))} · ${e(level.name || "-")}</div>
          </div>
          <div class="level-distance">${formatDistance(level.distance_pct)}</div>
        </div>
      `;
    }

    function renderTables(tables) {
      return (tables || []).map(renderTable).join("");
    }

    function renderTable(item, maxRows = MAX_DETAIL_TABLE_ROWS) {
      const columns = item.columns || [];
      const allRows = item.rows || [];
      if (!columns.length || !allRows.length) return "";
      const rows = allRows.slice(0, maxRows);
      const hidden = allRows.length - rows.length;
      return `
        <div class="table-wrap" aria-label="${e(item.title || "数据表")}">
          <table>
            <thead><tr>${columns.map(col => `<th>${e(col)}</th>`).join("")}</tr></thead>
            <tbody>
              ${rows.map(row => `<tr>${columns.map(col => `<td>${formatTableCell(col, row[col])}</td>`).join("")}</tr>`).join("")}
            </tbody>
          </table>
          ${hidden > 0 ? `<div class="table-more">另有 ${hidden} 行未展开。</div>` : ""}
        </div>
      `;
    }

    function renderCharts(skill) {
      const charts = skill.charts || [];
      if (!charts.length) return "";
      return charts.map((chart, index) => {
        if (chart.type !== "line") return "";
        return `<canvas class="curve-canvas" id="skill-chart-${e(skill.id)}-${index}"></canvas>`;
      }).join("");
    }

    function renderNotes(notes) {
      if (!notes || !notes.length) return "";
      return `<div class="module-sub" style="margin-top:10px">${notes.map(e).join("；")}</div>`;
    }

    function emptySmall(text) {
      return `<div class="empty" style="padding:12px">${e(text)}</div>`;
    }

    function collectDetailTables(skills) {
      const titleMap = {
        price_volume: "周期数据对比表",
        board_resonance: "板块共振对照表",
        candlestick_patterns: "形态结构数据表",
        warehouse_receipts: "仓单库存变化表",
        basis: "期现基差表",
        position_rank: "席位持仓表",
      };
      return skills
        .filter(skill => titleMap[skill.id])
        .flatMap(skill => (skill.tables || []).map(table => ({ ...table, title: titleMap[skill.id] })));
    }

    function nearestLevels(levels) {
      const pool = levelsForDisplay(levels);
      const support = pool.filter(row => row.type === "support").sort((a, b) => Math.abs(a.distance_pct ?? 999) - Math.abs(b.distance_pct ?? 999))[0];
      const resistance = pool.filter(row => row.type === "resistance").sort((a, b) => Math.abs(a.distance_pct ?? 999) - Math.abs(b.distance_pct ?? 999))[0];
      const confirm = pool
        .filter(row => !["support", "resistance"].includes(row.type) || /^MA/i.test(row.name || ""))
        .map(row => ({ ...row, type: "confirm" }))
        .sort((a, b) => Math.abs(a.distance_pct ?? 999) - Math.abs(b.distance_pct ?? 999))[0];
      return [resistance, support, confirm].filter(Boolean);
    }

    function stripHourFromSkill(skill) {
      if (!skill) return skill;
      return {
        ...skill,
        signals: filterSignalsByPeriod(skill.signals),
        levels: (skill.levels || []).filter(row => row.period !== "hour"),
      };
    }

    function normalizeSkills(item) {
      let skills = [];
      if (Array.isArray(item.analyzers) || Array.isArray(item.skills)) {
        skills = [...(item.analyzers || []), ...(item.skills || [])];
      } else if (Array.isArray(item.skills) && item.skills.length) {
        skills = item.skills;
      } else {
        skills = legacySkills(item);
      }
      return skills.map(stripHourFromSkill);
    }

    function isKnowledgeSkill(module) {
      const id = String(module?.id || "");
      if (module?.kind === "skill") return true;
      if (module?.kind === "analyzer") return false;
      return id === "insight" || id === "summary" || id === "research_lens"
        || id.endsWith("_framework") || id.startsWith("persona_");
    }

    function legacySkills(item) {
      const m = item.metrics || {};
      return [
        {
          id: "summary",
          title: "综合提炼",
          priority: item.score || 0,
          summary: `${item.state || ""}，${item.level || ""}。${compactDiagnosis(item)}`,
          signals: [
            ...(item.to_confirm || []).slice(0, 2).map(row => ({ name: "后续确认", level: "info", interpretation: row })),
            ...(item.invalidation || []).slice(0, 2).map(row => ({ name: "失效条件", level: "watch", interpretation: row })),
          ],
        },
        {
          id: "price_volume",
          title: "量价分析",
          priority: item.score || 50,

    function formatTableCell(column, value) {
      const text = formatCellForColumn(column, value);
      if (["涨跌幅", "持仓变化", "1日", "5日", "20日", "60日", "YTD"].includes(column)) return `<span class="${signedClass(text)}">${e(text)}</span>`;
      if (column === "路径") return `<span class="${/下行/.test(text) ? "down" : /上行/.test(text) ? "up" : ""}">${e(text)}</span>`;
      if (column === "类型") {

    function formatCellForColumn(column, value) {
      if (column === "成交量" || column === "持仓") return compactNumber(value);

    function signedClass(text) {
      if (String(text).startsWith("-")) return "down";
      if (/^[+]?([0-9]|\.)/.test(String(text)) && !String(text).startsWith("0.00")) return "up";
      return "";
    }

    function formatCell(value) {
      if (value === null || value === undefined || Number.isNaN(value)) return "-";
      if (typeof value === "number") return Number.isInteger(value) ? value.toLocaleString("zh-CN") : value.toLocaleString("zh-CN", { maximumFractionDigits: 4 });
      return value;
    }

    function formatDistance(value) {
      if (value === null || value === undefined || Number.isNaN(value)) return "-";
      const n = Number(value);
      return `${n > 0 ? "+" : ""}${n.toFixed(2)}%`;
    }

    function compactNumber(value) {
      if (value === null || value === undefined || Number.isNaN(value)) return "-";
      const n = Number(value);
      if (!Number.isFinite(n)) return value;
      if (Math.abs(n) >= 10000) return `${(n / 10000).toLocaleString("zh-CN", { maximumFractionDigits: 1 })}万`;
      return n.toLocaleString("zh-CN", { maximumFractionDigits: 0 });
    }

    function e(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function pct(value) {
      return value === null || value === undefined ? "-" : `${Number(value).toFixed(2)}%`;
    }

    function formatChange(value, kind = "pct") {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
      const n = Number(value);
      if (kind === "diff_bp") return `${n > 0 ? "+" : ""}${n.toFixed(1)}bp`;
      return `${n > 0 ? "+" : ""}${n.toFixed(2)}%`;
    }

    function signedText(value, kind = "pct") {
      return formatChange(value, kind);
    }

    function changeClass(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      if (n > 0) return "up";

      return "";

    const SERIES_SHORT_NAMES = {
      "国内大宗商品价格指数": "大宗商品",
      "美国10年期国债收益率": "美债10Y",
      "中国10年期国债收益率": "国债10Y",
      "美国10Y-2Y利差": "美债10Y-2Y",
      "美元兑人民币中间价": "美元/人民币",
    };

    function shortSeriesName(name) {
      const text = String(name || "").trim();
      if (!text) return "-";
      if (SERIES_SHORT_NAMES[text]) return SERIES_SHORT_NAMES[text];
      return shortIndexName(text);
    }

    function shortIndexName(name) {
      let text = String(name || "").trim();
      if (!text) return "-";
      text = text
        .replace(/^中证监控中国/, "")
        .replace(/^中证监控/, "")
        .replace(/^中证商品/, "商品")
        .replace(/^中证/, "")
        .replace(/期货指数$/, "")
        .replace(/^中国/, "")
        .trim();
      return text || String(name).trim() || "-";
    }

    function spec(value) {
      return value === null || value === undefined ? "-" : Number(value).toLocaleString("zh-CN", { maximumFractionDigits: 4 });
    }

    function money(value) {
      return value === null || value === undefined ? "-" : `¥${Number(value).toLocaleString("zh-CN", { maximumFractionDigits: 0 })}`;
    }

    function niceChartStep(span, ticks) {
      const rough = span / Math.max(ticks, 1);
      const mag = Math.pow(10, Math.floor(Math.log10(rough || 1)));
      const norm = rough / mag;
      let step = 10;
      if (norm <= 1) step = 1;
      else if (norm <= 2) step = 2;
      else if (norm <= 5) step = 5;
      return step * mag;
    }

    function niceChartTicks(min, max, count = 4) {
      if (!Number.isFinite(min) || !Number.isFinite(max)) return [0];
      if (min === max) return [min];
      const step = niceChartStep(max - min, count);
      const lo = Math.floor(min / step) * step;
      const hi = Math.ceil(max / step) * step;
      const ticks = [];
      for (let v = lo; v <= hi + step * 0.001; v += step) ticks.push(v);
      return ticks.length ? ticks : [min, max];
    }

    function formatChartAxisValue(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      const abs = Math.abs(n);
      if (abs >= 1000) return n.toFixed(0);
      if (abs >= 100) return n.toFixed(1);
      if (abs >= 10) return n.toFixed(2);
      return n.toFixed(3);
    }

    function chartDateTickIndices(length, maxTicks = 5) {
      if (length <= 1) return [0];
      const count = Math.min(maxTicks, length);
      const out = [];
      for (let i = 0; i < count; i++) out.push(Math.round(i * (length - 1) / (count - 1)));
      return out;
    }

    function buildMiniLineMeta(canvas, rows, tone, height, cnColors) {
      const rect = canvas.getBoundingClientRect();
      const parentWidth = canvas.parentElement?.clientWidth || 0;
      const ratio = window.devicePixelRatio || 1;
      const width = Math.max(320, Math.floor(rect.width || parentWidth || 320));
      const values = rows.map(row => Number(row.value)).filter(Number.isFinite);
      const rawMin = Math.min(...values);
      const rawMax = Math.max(...values);
      const yTicks = niceChartTicks(rawMin, rawMax, 4);
      const yMin = yTicks[0];
      const yMax = yTicks[yTicks.length - 1];
      const ySpan = Math.max(yMax - yMin, 1e-9);
      const pad = { left: 52, right: 16, top: 18, bottom: 30 };
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;
      const xAt = index => pad.left + (rows.length === 1 ? plotW / 2 : plotW * index / (rows.length - 1));
      const yAt = value => pad.top + (yMax - value) / ySpan * plotH;
      const lineColor = cnColors
        ? (tone === "up" ? "#b83232" : tone === "down" ? "#2d6a3e" : "#8b5a2b")
        : (tone === "up" ? "#2d6a3e" : tone === "down" ? "#b83232" : "#8b5a2b");
      return {
        rows,
        width,
        height,
        ratio,
        pad,
        plotW,
        plotH,
        yTicks,
        yMin,
        yMax,
        ySpan,
        xAt,
        yAt,
        lineColor,
        xTickIndices: chartDateTickIndices(rows.length, 5),
        hoverIndex: -1,
      };
    }

    function nearestChartIndex(canvas, meta, clientX) {
      const rect = canvas.getBoundingClientRect();
      const localX = clientX - rect.left;
      let best = 0;
      let bestDist = Infinity;
      meta.rows.forEach((_, index) => {
        const dist = Math.abs(meta.xAt(index) - localX);
        if (dist < bestDist) {
          bestDist = dist;
          best = index;
        }
      });
      return best;
    }

    function renderMiniLine(canvas, meta) {
      const { rows, width, height, ratio, pad, plotW, plotH, yTicks, yMax, ySpan, xAt, yAt, lineColor, xTickIndices, hoverIndex } = meta;
      canvas.width = width * ratio;
      canvas.height = height * ratio;
      const ctx = canvas.getContext("2d");
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.clearRect(0, 0, width, height);

      ctx.strokeStyle = "#e4ddd2";
      ctx.lineWidth = 1;
      yTicks.forEach(tick => {
        const yy = pad.top + (yMax - tick) / ySpan * plotH;
        ctx.beginPath();
        ctx.moveTo(pad.left, yy);
        ctx.lineTo(width - pad.right, yy);
        ctx.stroke();
      });

      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      let started = false;
      rows.forEach((row, index) => {
        const value = Number(row.value);
        if (!Number.isFinite(value)) return;
        const px = xAt(index);
        const py = yAt(value);
        if (!started) { ctx.moveTo(px, py); started = true; }
        else ctx.lineTo(px, py);
      });
      ctx.stroke();

      ctx.fillStyle = "#9a9084";
      ctx.font = "11px PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      yTicks.forEach(tick => {
        const yy = pad.top + (yMax - tick) / ySpan * plotH;
        ctx.fillText(formatChartAxisValue(tick), pad.left - 8, yy);
      });

      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      xTickIndices.forEach(index => {
        const label = String(rows[index]?.time || "").slice(0, 10);
        if (!label) return;
        ctx.fillText(label, xAt(index), height - pad.bottom + 6);
      });

      if (hoverIndex >= 0 && rows[hoverIndex]) {
        const row = rows[hoverIndex];
        const value = Number(row.value);
        if (Number.isFinite(value)) {
          const px = xAt(hoverIndex);
          const py = yAt(value);
          ctx.setLineDash([4, 3]);
          ctx.strokeStyle = "#c4a574";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(px, pad.top);
          ctx.lineTo(px, pad.top + plotH);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = lineColor;
          ctx.beginPath();
          ctx.arc(px, py, 4, 0, Math.PI * 2);
          ctx.fill();
          const tip = `${String(row.time || "").slice(0, 10)}  ${formatChartAxisValue(value)}`;
          ctx.font = "12px PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif";
          const tipW = ctx.measureText(tip).width + 16;
          const tipH = 22;
          let tipX = px - tipW / 2;
          tipX = Math.max(pad.left, Math.min(tipX, width - pad.right - tipW));
          const tipY = Math.max(4, py - 30);
          ctx.fillStyle = "rgba(42, 36, 28, 0.88)";
          roundRect(ctx, tipX, tipY, tipW, tipH, 4);
          ctx.fill();
          ctx.fillStyle = "#fffcf7";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(tip, tipX + tipW / 2, tipY + tipH / 2);
        }
      }
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function bindMiniLineHover(canvas) {
      if (canvas._miniHoverBound) return;
      canvas._miniHoverBound = true;
      canvas.addEventListener("mousemove", event => {
        const meta = canvas._miniChartMeta;
        if (!meta) return;
        const next = nearestChartIndex(canvas, meta, event.clientX);
        if (next === meta.hoverIndex) return;
        meta.hoverIndex = next;
        renderMiniLine(canvas, meta);
      });
      canvas.addEventListener("mouseleave", () => {
        const meta = canvas._miniChartMeta;
        if (!meta || meta.hoverIndex < 0) return;
        meta.hoverIndex = -1;
        renderMiniLine(canvas, meta);
      });
    }

    function drawMiniLine(canvas, rows, tone = "neutral", height = 180, cnColors = false) {
      if (!canvas || !rows.length) return;
      const meta = buildMiniLineMeta(canvas, rows, tone, height, cnColors);
      meta.hoverIndex = canvas._miniChartMeta?.hoverIndex ?? -1;
      canvas._miniChartMeta = meta;
      renderMiniLine(canvas, meta);
      bindMiniLineHover(canvas);
    }

    function renderSeasonalityPanel(skill) {

    function renderSeasonalYearChip(row, index) {

    function bindSeasonalChart(skill) {
      const chart = (skill?.charts || []).find(item => item.type === "seasonal");
      const canvas = document.getElementById("seasonal-chart");

    }

    function drawSeasonalChart(canvas, chart) {
      const series = (chart.series || []).filter(row => !state.seasonalHiddenYears[row.year]);
      if (!series.length) return;

      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const width = Math.max(520, Math.floor(rect.width));
      const height = 280;
      canvas.width = width * ratio;
      canvas.height = height * ratio;
      const ctx = canvas.getContext("2d");
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const pad = { left: 58, right: 16, top: 16, bottom: 34 };
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;
      const xForDoy = doy => pad.left + (Math.max(1, Math.min(365, doy)) - 1) / 364 * plotW;

      const allCloses = series.flatMap(row => (row.points || []).map(point => Number(point.close))).filter(Number.isFinite);
      if (!allCloses.length) return;
      const min = Math.min(...allCloses);
      const max = Math.max(...allCloses);
      const span = Math.max(max - min, 1);
      const y = value => pad.top + (max - value) / span * plotH;

      ctx.strokeStyle = "#eef1f5";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const yy = pad.top + plotH * i / 4;
        ctx.beginPath();
        ctx.moveTo(pad.left, yy);
        ctx.lineTo(width - pad.right, yy);
        ctx.stroke();
      }

      const monthTicks = [1, 32, 60, 91, 121, 152, 182, 213, 244, 274, 305, 335];
      const monthLabels = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
      monthTicks.forEach((doy, index) => {
        const xx = xForDoy(doy);
        ctx.strokeStyle = "#f0f2f5";
        ctx.beginPath();
        ctx.moveTo(xx, pad.top);
        ctx.lineTo(xx, height - pad.bottom);
        ctx.stroke();
        if (index % 2 === 0) {
          ctx.fillStyle = "#8a95a5";
          ctx.font = "11px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(monthLabels[index], xx, height - 12);
        }
      });

      if (chart.focus_month) {
        const startDoy = monthTicks[chart.focus_month - 1] || 1;
        const endDoy = monthTicks[chart.focus_month] || 365;
        ctx.fillStyle = "rgba(55, 138, 221, 0.08)";
        ctx.fillRect(xForDoy(startDoy), pad.top, xForDoy(endDoy) - xForDoy(startDoy), plotH);
      }
      if (chart.focus_doy) {
        const xx = xForDoy(chart.focus_doy);
        ctx.strokeStyle = "rgba(55, 138, 221, 0.45)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(xx, pad.top);
        ctx.lineTo(xx, height - pad.bottom);
        ctx.stroke();
      }

      series.forEach((row, index) => {
        const color = SEASONAL_YEAR_COLORS[(chart.series || []).findIndex(item => item.year === row.year) % SEASONAL_YEAR_COLORS.length];
        const points = row.points || [];
        ctx.strokeStyle = color;
        ctx.lineWidth = row.in_progress ? 2.5 : 1.8;
        ctx.beginPath();
        let started = false;
        points.forEach(point => {
          const value = Number(point.close);
          if (!Number.isFinite(value)) return;
          const px = xForDoy(point.doy);
          const py = y(value);
          if (!started) {
            ctx.moveTo(px, py);
            started = true;
          } else {
            ctx.lineTo(px, py);
          }
        });
        ctx.stroke();
      });

      ctx.fillStyle = "#697586";
      ctx.font = "11px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";
      ctx.textAlign = "right";
      for (let i = 0; i <= 4; i++) {
        const value = max - span * i / 4;
        ctx.fillText(value.toFixed(0), pad.left - 8, pad.top + plotH * i / 4 + 4);
      }
    }

    function toMiniLineRows(points, options = {}) {
      const valueKey = options.valueKey || "value";
      const timeKey = options.timeKey || "time";
      return (points || []).map(point => {
        const value = Number(point[valueKey] ?? point.value ?? point["价格"]);
        const time = String(point[timeKey] ?? point.time ?? point["月份"] ?? "");
        return { time, value };
      }).filter(row => Number.isFinite(row.value));
    }

    function drawStandardLineChart(canvas, points, options = {}) {
      const rows = toMiniLineRows(points, options);
      if (!canvas || !rows.length) return;
      drawMiniLine(canvas, rows, options.tone || "neutral", options.height || 180, true);
    }

    function drawTermCurve(canvas, points) {
      drawStandardLineChart(canvas, points, { valueKey: "价格", timeKey: "月份" });
    }

    function drawKline(canvas, rows) {
      if (!canvas || !rows.length) return;
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const width = Math.max(640, Math.floor(rect.width));
      const height = 360;
      canvas.width = width * ratio;
      canvas.height = height * ratio;
      const ctx = canvas.getContext("2d");
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const pad = { left: 54, right: 18, top: 18, bottom: 34 };
      const volumeHeight = 72;
      const priceBottom = height - pad.bottom - volumeHeight - 16;
      const plotW = width - pad.left - pad.right;
      const priceH = priceBottom - pad.top;
      const volTop = priceBottom + 16;
      const volH = height - pad.bottom - volTop;

      const highs = rows.map(r => r.high).filter(Number.isFinite);
      const lows = rows.map(r => r.low).filter(Number.isFinite);
      const prices = highs.concat(lows);
      const minPrice = Math.min(...prices);
      const maxPrice = Math.max(...prices);
      const span = Math.max(maxPrice - minPrice, 1);
      const priceY = value => pad.top + (maxPrice - value) / span * priceH;
      const maxVol = Math.max(...rows.map(r => r.volume || 0), 1);
      const step = plotW / rows.length;
      const bodyW = Math.max(2, Math.min(9, step * 0.58));

      ctx.strokeStyle = "#dce2ea";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i <= 4; i++) {
        const y = pad.top + priceH * i / 4;
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
      }
      ctx.moveTo(pad.left, volTop);
      ctx.lineTo(width - pad.right, volTop);
      ctx.stroke();

      ctx.fillStyle = "#697586";
      ctx.font = "12px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";
      ctx.textAlign = "right";
      for (let i = 0; i <= 4; i++) {
        const value = maxPrice - span * i / 4;
        ctx.fillText(value.toFixed(2), pad.left - 8, pad.top + priceH * i / 4 + 4);
      }

      rows.forEach((row, i) => {
        const x = pad.left + step * i + step / 2;
        const rising = row.close >= row.open;
        const color = rising ? "#b83232" : "#2d6a3e";
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x, priceY(row.high));
        ctx.lineTo(x, priceY(row.low));
        ctx.stroke();
        const y1 = priceY(Math.max(row.open, row.close));
        const y2 = priceY(Math.min(row.open, row.close));
        ctx.fillRect(x - bodyW / 2, y1, bodyW, Math.max(1, y2 - y1));
        const volBarH = (row.volume || 0) / maxVol * volH;
        ctx.globalAlpha = 0.25;
        ctx.fillRect(x - bodyW / 2, volTop + volH - volBarH, bodyW, volBarH);
        ctx.globalAlpha = 1;
      });

      drawLine(ctx, rows, "ma20", "#378add", pad.left, step, priceY);
      drawLine(ctx, rows, "ma60", "#ea4335", pad.left, step, priceY);

      ctx.fillStyle = "#697586";
      ctx.textAlign = "center";
      const first = rows[0]?.time || "";
      const last = rows[rows.length - 1]?.time || "";
      ctx.fillText(first.slice(0, 10), pad.left + 40, height - 12);
      ctx.fillText(last.slice(0, 10), width - pad.right - 40, height - 12);
    }

    function drawLine(ctx, rows, key, color, left, step, priceY) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      let started = false;
      rows.forEach((row, i) => {
        const value = row[key];
        if (!Number.isFinite(value)) return;
        const x = left + step * i + step / 2;
        const y = priceY(value);
        if (!started) {
          ctx.moveTo(x, y);
          started = true;
        } else {
          ctx.lineTo(x, y);
        }
      });
      if (started) ctx.stroke();
    }
  </script>
</body>
