<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>期货决策系统</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f0ea;
      --bg-side: #faf8f4;
      --panel: #fffcf7;
      --panel-soft: #f7f4ef;
      --l1-bg: #fff9f0;
      --line: #e4ddd2;
      --text: #2a241c;
      --muted: #6f6558;
      --subtle: #9a9084;
      --accent: #8b5a2b;
      --accent-soft: #f5ebe0;
      --accent-line: #c4a574;
      --danger: #b83232;
      --danger-deep: #8f2828;
      --danger-soft: #fce8e6;
      --warning: #9a6b00;
      --warning-soft: #faf0d4;
      --success: #2d6a3e;
      --success-soft: #e6f0e8;
      --neutral-soft: #f1efe8;
      --shadow: none;
      --font-sans: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --font-display: "PingFang SC", "Songti SC", "STSong", "Microsoft YaHei", serif;
      --space-1: 8px;
      --space-2: 16px;
      --space-3: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
    }
    header.app-header {
      height: 52px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 15px; font-weight: 700; letter-spacing: 0; }
    h2 { font-size: 24px; line-height: 1.2; }
    h3 { font-size: 15px; font-weight: 600; line-height: 1.3; }
    h4 { font-size: 13px; font-weight: 600; line-height: 1.35; }
    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      height: 34px;
      padding: 0 14px;
      cursor: pointer;
      font: inherit;
    }
    button:disabled { opacity: .55; cursor: wait; }
    .app-brand {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
      justify-self: start;
    }
    .app-brand-sub {
      color: var(--subtle);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .app-nav {
      justify-self: center;
    }
    .app-actions {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .view-switch {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-soft);
    }
    .view-tab {
      min-width: 104px;
      height: 32px;
      padding: 0 14px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }
    .view-tab.active {
      background: var(--panel);
      color: var(--accent);
      border-color: var(--line);
      box-shadow: 0 1px 2px rgba(42, 36, 28, 0.06);
    }
    .btn-ghost {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      font-weight: 600;
    }
    .btn-ghost:hover:not(:disabled) {
      border-color: var(--accent-line);
      color: var(--accent);
    }
    main {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    aside {
      border-right: 1px solid var(--line);
      background: var(--bg-side);
      overflow-y: auto;
      min-height: 0;
    }
    .status {
      color: var(--muted);
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      line-height: 1.7;
    }
    .watch-list { display: grid; }
    .item-row {
      display: grid;
      grid-template-columns: 4px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }
    .item-row.active {
      background: var(--accent-soft);
    }
    .item-priority {
      align-self: stretch;
      width: 4px;
      border-radius: 2px;
      background: var(--line);
    }
    .item-priority.score-high { background: var(--danger); }
    .item-priority.score-mid { background: var(--warning); }
    .item-priority.score-low { background: var(--subtle); }
    .item-score {
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      min-width: 1.6em;
      text-align: right;
    }
    .item-row.active .item-score { color: var(--accent); }
    .item-row.active .item-priority { background: var(--accent); }
    .item-row.active .item-priority.score-high { background: var(--danger-deep); }
    .item-main { min-width: 0; }
    .item-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .item-title strong, .ellipsis {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .item-brief {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 16px;
      color: var(--muted);
      font-size: 12px;
    }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex: 0 0 auto;
    }
    .content {
      padding: 20px 24px 32px;
      overflow-y: auto;
      min-height: 0;
    }
    .dashboard {
      display: grid;
      gap: var(--space-2);
      max-width: 960px;
      margin: 0 auto;
    }
    main.global-view .dashboard {
      max-width: 1200px;
    }
    .macro-bar {
      padding: 12px 16px;
      display: grid;
      gap: 8px;
    }
    .macro-bar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .macro-bar-head h3 {
      margin: 0;
    }
    .macro-bar-lead {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .macro-event-list {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .macro-event-list li {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }
    .macro-event-list .k {
      color: var(--text);
      font-weight: 600;
    }
    .macro-release-wrap {
      margin-top: 12px;
    }
    .macro-release-wrap + .macro-release-wrap {
      margin-top: 16px;
    }
    .macro-subhead {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }
    .macro-release-table td,
    .macro-release-table th {
      font-size: 12px;
    }
    .macro-release-table .pending {
      color: var(--warning);
      font-weight: 600;
    }
    .macro-release-table .beat-above {
      color: var(--danger);
      font-weight: 600;
    }
    .macro-release-table .beat-below {
      color: var(--success);
      font-weight: 600;
    }
    .macro-calendar-block {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
    }
    section, .module, .metric, .period-group, .level-item, .signal-card, .pattern-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    section, .module { padding: 16px; }
    .evidence-card, .hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .hero {
      display: block;
    }
    .detail-header {
      display: grid;
      grid-template-columns: minmax(168px, 210px) minmax(0, 1fr);
      gap: 16px;
      align-items: center;
      padding: 14px 16px;
    }
    .detail-header .chips {
      margin-top: 6px;
    }
    .detail-header-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      min-width: 0;
      border-left: 1px solid var(--line);
      padding-left: 16px;
    }
    .detail-header-metrics .metric {
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 4px 12px;
      border-right: 1px solid var(--line);
    }
    .detail-header-metrics .metric:last-child {
      border-right: 0;
    }
    .detail-header-metrics .metric .value {
      font-size: 18px;
    }
    .hero-score {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .hero-title {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 8px;
    }
    .hero-symbol { color: var(--muted); font-size: 14px; }
    .hero-brief {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.55;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }
    .chip, .type-pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      background: #fff;
      white-space: nowrap;
    }
    .chip.info { border-color: var(--accent-line); background: var(--accent-soft); color: var(--accent); }
    .chip.danger { border-color: #f4c7c3; background: var(--danger-soft); color: var(--danger-deep); }
    .chip.success { border-color: #cfe4bd; background: var(--success-soft); color: var(--success); }
    .chip.warning { border-color: #f8df90; background: var(--warning-soft); color: #7a4b00; }
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    main.global-view {
      grid-template-columns: minmax(0, 1fr);
    }
    main.global-view aside {
      display: none;
    }
    .global-meta-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      padding: 10px 14px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .decision-band {
      background: var(--l1-bg);
      border: 1px solid var(--accent-line);
      border-left: 5px solid var(--accent);
      border-radius: 0 10px 10px 0;
      padding: 20px 22px;
      box-shadow: none;
    }
    /* 标题层级：display 20px · title 15px · group 13px · caption 12px */
    .band-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .decision-eyebrow {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: .04em;
      margin-bottom: 8px;
    }
    .zone-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
      margin: var(--space-2) 0 var(--space-1);
    }
    .group-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
      color: var(--muted);
      margin: 0 0 4px;
    }
    .decision-headline-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .decision-headline {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      line-height: 1.45;
      margin: 0;
      flex: 1;
      min-width: 0;
    }
    .decision-headline-row .chip {
      flex-shrink: 0;
      margin-top: 2px;
    }
    .decision-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      background: #fff;
    }
    .pill.hot {
      border-color: #e8b4b0;
      background: var(--danger-soft);
      color: var(--danger);
    }
    .narrative-panel {
      border-left: 5px solid var(--accent);
    }
    .narrative-list {
      margin-top: 10px;
      display: grid;
      gap: 14px;
    }
    .narrative-section-title {
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-transform: none;
    }
    .narrative-section.verify .narrative-section-title {
      color: var(--warning);
    }
    .insight-block {
      margin-bottom: 4px;
    }
    .insight-lead {
      margin: 0 0 12px;
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text);
    }
    .insight-lines {
      display: grid;
      gap: 6px;
    }
    .insight-line {
      margin: 0;
      display: grid;
      grid-template-columns: 2.8em minmax(0, 1fr);
      gap: 6px;
      align-items: start;
      font-size: 13px;
      line-height: 1.65;
      color: var(--muted);
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .insight-line .k {
      color: var(--subtle);
      font-size: 12px;
      font-weight: 600;
      padding-top: 1px;
    }
    .insight-line.gap {
      color: var(--subtle);
    }
    .insight-hit-list,
    .insight-tag-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 6px;
    }
    .insight-hit-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      padding: 2px 0;
      font-size: 13px;
      line-height: 1.55;
    }
    .insight-hit-name {
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }
    .insight-hit-desc {
      color: var(--muted);
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .insight-section-label {
      margin: 0 0 6px;
    }
    .insight-summary {
      margin: 10px 0 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
    }
    .insight-tag-list li {
      font-size: 13px;
      line-height: 1.65;
      color: var(--muted);
      word-break: break-word;
      overflow-wrap: anywhere;
      padding: 0;
      border: 0;
    }
    .insight-tag-list .k {
      color: var(--subtle);
      font-size: 12px;
      font-weight: 600;
      padding-top: 1px;
    }
    .seasonal-panel {
      display: grid;
      gap: 12px;
    }
    .seasonal-interpret {
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      font-size: 13px;
      line-height: 1.65;
      color: var(--muted);
    }
    .seasonal-interpret .k {
      color: var(--text);
      font-weight: 700;
      margin-right: 6px;
    }
    .seasonal-year-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .seasonal-year-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
    }
    .seasonal-year-chip.off {
      opacity: .4;
      text-decoration: line-through;
    }
    .seasonal-year-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }
    canvas#seasonal-chart {
      width: 100%;
      height: 280px;
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .driver-group-block {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
    }
    .driver-groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--space-2);
      align-items: start;
    }
    .driver-groups-grid .driver-group-block {
      margin-top: 0;
    }
    .driver-groups-grid .change-matrix.compact {
      min-width: 0;
    }
    .driver-zone-layout {
      display: grid;
      grid-template-columns: minmax(0, max-content) minmax(260px, 1fr);
      gap: var(--space-2);
      align-items: start;
    }
    .driver-matrix-wrap .change-matrix {
      max-width: 100%;
    }
    .driver-lens-panel {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
      min-width: 0;
    }
    .driver-lens-list {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }
    .driver-lens-item + .driver-lens-item {
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .driver-lens-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .driver-lens-text {
      margin: 0;
      font-size: 13px;
      line-height: 1.55;
      color: var(--muted);
    }
    .driver-category-row td {
      padding: 10px 12px;
      text-align: left !important;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      background: var(--panel-soft);
      border-bottom: 1px solid var(--line);
    }
    .driver-group-block + .driver-group-block {
      margin-top: 12px;
    }
    .driver-group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 800;
    }
    .change-matrix-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .change-matrix {
      width: max-content;
      max-width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .change-matrix th,
    .change-matrix td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: right;
      white-space: nowrap;
      vertical-align: middle;
    }
    .change-matrix th:first-child,
    .change-matrix td:first-child,
    .change-matrix th:nth-child(2),
    .change-matrix td:nth-child(2) {
      text-align: left;
    }
    .change-matrix th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      background: var(--panel-soft);
    }
    .change-matrix tr:last-child td {
      border-bottom: 0;
    }
    .change-matrix-row {
      cursor: pointer;
      transition: background .12s ease;
    }
    .change-matrix-row:hover {
      background: var(--panel-soft);
    }
    .change-matrix-row.chart-open {
      background: var(--accent-soft);
    }
    .change-matrix .name-cell {
      width: 1%;
      font-weight: 600;
      white-space: nowrap;
    }
    .change-matrix .code-cell,
    .change-matrix .group-cell,
    .change-matrix .constituent-toggle-cell {
      width: 1%;
      white-space: nowrap;
    }
    .change-matrix .group-cell {
      color: var(--muted);
      font-size: 12px;
    }
    .change-matrix .latest-cell {
      font-weight: 700;
      color: var(--text);
    }
    .change-cell.rise {
      background: var(--danger-soft);
      color: var(--danger-deep);
      font-weight: 700;
    }
    .change-cell.fall {
      background: var(--success-soft);
      color: var(--success);
      font-weight: 700;
    }
    .change-cell.flat {
      color: var(--muted);
    }
    .change-cell.heatmap-cell {
      font-weight: 700;
      transition: background-color .12s ease, color .12s ease;
    }
    .change-cell.heatmap-cell.flat {
      background: var(--neutral-soft);
      color: var(--subtle);
    }
    .constituent-toggle-cell {
      text-align: center !important;
    }
    .constituent-toggle {
      height: 26px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font: inherit;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .constituent-toggle.open {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #1f6aa5;
    }
    .constituent-detail-row td {
      padding: 0 !important;
      background: var(--panel-soft);

      .term-spread-grid { grid-template-columns: 1fr; }
    }
    .chart-collapse .chart-head {
      margin-bottom: 0;
    }
    .chart-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: auto;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }
    .chart-toggle h3 {
      font-size: 15px;
    }
    .chart-chevron {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-right: 2px solid var(--muted);
      border-bottom: 2px solid var(--muted);
      transform: rotate(-45deg);
      transition: transform .15s ease;
      flex: 0 0 auto;
    }
    .chart-collapse.open .chart-chevron {
      transform: rotate(45deg);
    }
    .chart-body {
      margin-top: 12px;
    }
    .chart-body[hidden] {
      display: none;
    }
    .kline-panel .chart-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    canvas#kline {
      width: 100%;
      height: 360px;
      display: block;
    }
    .table-more {
      margin-top: 8px;
      color: var(--subtle);
      font-size: 12px;
    }
    .empty {
      color: var(--muted);
      padding: 30px;
      line-height: 1.7;
    }
    .muted { color: var(--muted); }
    .subtle { color: var(--subtle); }
    .up { color: var(--danger); }
    .down { color: var(--success); }
    .warn { color: var(--warning); }
    @media (max-width: 1100px) {
      main { grid-template-columns: 290px minmax(0, 1fr); }
      .detail-header { grid-template-columns: 1fr; align-items: start; }
      .detail-header-metrics {
        border-left: 0;
        padding-left: 0;
        border-top: 1px solid var(--line);
        padding-top: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .detail-header-metrics .metric {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
      }
      .metrics-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .card-grid, .level-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .driver-chart-layout { grid-template-columns: 1fr; }
      .driver-chart-right { position: static; }
      .nanhua-index-layout { grid-template-columns: 1fr; }
      .nanhua-index-right { position: static; }
      .board-product-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 860px) {
      header.app-header {
        grid-template-columns: 1fr auto;
        grid-template-areas:
          "brand actions"
          "nav nav";
        height: auto;
        padding: 10px 14px;
        gap: 10px;
      }
      .app-brand { grid-area: brand; flex-direction: column; align-items: flex-start; gap: 2px; }
      .app-brand-sub { display: none; }
      .app-nav { grid-area: nav; justify-self: stretch; }
      .view-switch { width: 100%; }
      .view-tab { flex: 1; min-width: 0; }
      .app-actions { grid-area: actions; }
      main { grid-template-columns: 1fr; }
      aside { max-height: 42vh; border-right: 0; border-bottom: 1px solid var(--line); }
      .content { padding: 14px; }
      .driver-zone-layout { grid-template-columns: 1fr; }
      .section-grid { grid-template-columns: 1fr; }
      .matrix-layout { grid-template-columns: 1fr; }
      .module.wide { grid-column: auto; }
      .card-grid, .level-grid { grid-template-columns: 1fr; }
      .hero { grid-template-columns: 48px minmax(0, 1fr); }
      .score-ring.large { width: 48px; height: 48px; font-size: 18px; }
      .summary-top, .module-head, .chart-head { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-brand">
      <h1>期货决策系统</h1>
      <span class="app-brand-sub">公众号：迷你量化</span>
    </div>
    <nav class="app-nav" aria-label="主视图">
      <div class="view-switch" role="tablist">
        <button type="button" class="view-tab active" id="globalTab" role="tab" aria-selected="true" onclick="setView('global')">大盘首页</button>
        <button type="button" class="view-tab" id="watchTab" role="tab" aria-selected="false" onclick="setView('watch')">品种决策</button>
      </div>
    </nav>
    <div class="app-actions">
      <button type="button" class="btn-ghost" id="refresh">刷新数据</button>
    </div>
  </header>
  <main class="global-view">
    <aside>
      <div class="status" id="status">打开页面后优先复用今日缓存。</div>
      <div id="list"></div>
    </aside>
    <div class="content" id="detail">
      <div class="empty">等待刷新结果。</div>
    </div>
  </main>

  <script>
    const MAX_DETAIL_TABLE_ROWS = 6;
    const DETAIL_PILLARS = [
      { id: "overview", label: "总览" },
      { id: "market", label: "量价技术", moduleIds: ["price_volume", "board_resonance", "technical_signals", "candlestick_patterns", "key_levels"], tableIds: ["price_volume", "candlestick_patterns", "board_resonance"], extras: ["kline"] },
      { id: "fundamental", label: "产业基本面", moduleIds: ["product_framework", "board_framework", "basis", "warehouse_receipts"] },
      { id: "seasonal", label: "季节性", moduleIds: ["seasonality"] },
      { id: "capital", label: "资金结构", moduleIds: ["term_structure", "position_rank"] },
    ];
    const SEASONAL_YEAR_COLORS = ["#378add", "#f5a623", "#f8d90f", "#50c878", "#b37feb", "#7ed6df", "#95a5a6", "#4a5568"];
    const NANHUA_CHART_COLORS = SEASONAL_YEAR_COLORS;
    const NANHUA_COMPOSITE_CODES = new Set(["NHII", "NHMI"]);
    const NANHUA_LEAF_CODES = new Set(["NHAI", "NHECI", "NHFI", "NHNFI", "NHPMI"]);
    const NANHUA_TABLE_ORDER = { NHCI: 0, NHAI: 1, NHECI: 2, NHFI: 3, NHNFI: 4, NHPMI: 5 };
    let state = { items: [], selected: 0, period: "day", matrixCell: null, view: "global", global: null, macro: null, globalExpandedIndexId: null, globalOpenChartId: null, boardProductExpanded: {}, detailPillar: "overview", seasonalHiddenYears: {} };
    const GLOBAL_PERIOD_COLS = [
      { key: "1d", label: "日度" },
      { key: "5d", label: "周度" },
      { key: "ytd", label: "YTD" },
    ];
    const DRIVER_GROUP_ORDER = ["国内商品", "海外利率", "国内利率", "汇率", "外盘商品", "股票风险偏好"];
    const DRIVER_GROUP_LENS = {
      "国内商品": "现货氛围与期货指数互相印证，看同向还是背离。",
      "海外利率": "利率路径决定金融条件；路径转紧压制估值，转松需结合增长叙事。",
      "国内利率": "反映国内增长与流动性，黑色、地产链敏感度更高。",
      "汇率": "人民币走弱抬升进口成本，影响内盘计价与跨境价差。",
      "外盘商品": "全球定价锚；原油看地缘与库存，金属看工业与电网需求。",
      "股票风险偏好": "A 股风偏辅助判断交易情绪，不与商品简单同向。",
    };
    const API_BASE = window.location.protocol === "file:" ? "http://127.0.0.1:8011" : "";
    const statusEl = document.getElementById("status");
    const listEl = document.getElementById("list");
    const detailEl = document.getElementById("detail");
    const refreshBtn = document.getElementById("refresh");
    const globalTab = document.getElementById("globalTab");
    const watchTab = document.getElementById("watchTab");

    refreshBtn.addEventListener("click", () => state.view === "global" ? refreshGlobal(true) : refresh(true));
    detailEl.addEventListener("click", onGlobalDetailClick);
    window.addEventListener("load", init);

    function onGlobalDetailClick(event) {
      if (state.view !== "global") return;
      const chartBtn = event.target.closest("[data-toggle-chart]");
      if (chartBtn) {
        event.preventDefault();
        toggleRowChart(chartBtn.getAttribute("data-toggle-chart"));
        return;
      }
      const constituentBtn = event.target.closest("[data-toggle-constituents]");
      if (constituentBtn) {
        event.preventDefault();
        toggleGlobalIndexExpand(constituentBtn.getAttribute("data-toggle-constituents"));
        return;
      }
      const boardExpandBtn = event.target.closest("[data-toggle-board-products]");
      if (boardExpandBtn) {
        event.preventDefault();
        toggleBoardProductExpand(boardExpandBtn.getAttribute("data-toggle-board-products"));
        return;
      }
      const productChip = event.target.closest("[data-open-product]");
      if (productChip) {
        event.preventDefault();
        openProductFromSymbol(productChip.getAttribute("data-open-product"));
      }
    }

    async function init() {
      const usedGlobalCache = await loadGlobalCache(true);
      if (!usedGlobalCache) await refreshGlobal(false);
      const usedCache = await loadCache(true);
      if (!usedCache) refresh(false);
      else if (!cacheHasSkills()) refresh(true);
      if (state.global && !globalMatrixReady(state.global) && state.items?.length) {
        await refreshGlobal(false);
      }
    }

    function setView(view) {
      state.view = view;
      document.querySelector("main").classList.toggle("global-view", view === "global");
      globalTab.classList.toggle("active", view === "global");
      watchTab.classList.toggle("active", view === "watch");
      globalTab.setAttribute("aria-selected", view === "global" ? "true" : "false");
      watchTab.setAttribute("aria-selected", view === "watch" ? "true" : "false");
      refreshBtn.textContent = view === "global" ? "刷新大盘" : "刷新数据";
      renderList();
      renderCurrent();
    }

    function renderCurrent() {
      if (state.view === "global") renderGlobalMarket();
      else renderDetail();
    }

    async function refreshGlobal(force = false) {
      refreshBtn.disabled = true;
      statusEl.textContent = force ? "正在强制刷新大盘首页数据..." : "正在刷新大盘首页数据...";
      try {
        const response = await fetch(`${API_BASE}/api/global-market/refresh${force ? "?force=1" : ""}`, { method: "POST" });
        const payload = await response.json();
        if (payload.ok === false) throw new Error(payload.message || "大盘首页刷新失败");
        state.global = payload;
        renderList();
        renderCurrent();
      } catch (error) {
        statusEl.innerHTML = `<span class="warn">大盘刷新失败：</span>${e(error.message)}<br>${apiHint()}`;
        await loadGlobalCache(false);
      } finally {
        refreshBtn.disabled = false;
      }
    }

    function globalNarrativeReady(payload) {
      const narrative = payload?.narrative;
      return !!(narrative && typeof narrative === "object" && narrative.version === 2 && narrative.sections?.length);
    }

    function globalMatrixReady(payload) {
      const matrix = payload?.board_product_matrix;
      return !!(matrix && matrix.status === "ok" && (matrix.rows || []).some(row => row.product_count > 0));
    }

    async function loadGlobalCache(onlyToday) {
      try {
        const response = await fetch(`${API_BASE}/api/global-market`);
        const payload = await response.json();
        if (payload.ok === false) return false;
        if (onlyToday && !payload.cache_is_today) return false;
        if (onlyToday && !(payload.nanhua_indices && payload.nanhua_indices.length)) return false;
        if (onlyToday && !globalNarrativeReady(payload)) return false;
        state.global = payload;
        renderList();
        renderCurrent();
        return true;
      } catch (error) {
        if (state.view === "global") {
          statusEl.innerHTML = `<span class="warn">连接大盘数据失败：</span>${e(error.message)}<br>${apiHint()}`;
        }
      }
      return false;
    }

    async function refresh(force = false) {
      refreshBtn.disabled = true;
      statusEl.textContent = force ? "正在强制请求天勤行情并计算指标..." : "正在请求天勤行情并计算指标...";
      try {
        const response = await fetch(`${API_BASE}/api/refresh${force ? "?force=1" : ""}`, { method: "POST" });
        const payload = await response.json();
        if (!payload.ok) throw new Error(payload.message || "刷新失败");
        state.items = payload.items || [];
        state.macro = payload.macro || null;
        state.selected = 0;
        renderList();
        renderCurrent();
      } catch (error) {
        statusEl.innerHTML = `<span class="warn">刷新失败：</span>${e(error.message)}<br>${apiHint()}`;
        await loadCache(false);
      } finally {
        refreshBtn.disabled = false;
      }
    }

    async function loadCache(onlyToday) {
      try {
        const response = await fetch(`${API_BASE}/api/snapshot`);
        const payload = await response.json();
        if (onlyToday && !payload.cache_is_today) return false;
        if (payload.items && payload.items.length) {
          state.items = payload.items;
          state.macro = payload.macro || null;
          state.selected = 0;
          renderList();
          renderCurrent();
          return true;
        }
      } catch (error) {
        statusEl.innerHTML = `<span class="warn">连接服务失败：</span>${e(error.message)}<br>${apiHint()}`;
      }
      return false;
    }

    function apiHint() {
      return `请确认服务已启动，并从 <strong>http://127.0.0.1:8011</strong> 打开看板。`;
    }

    function cacheHasSkills() {
      return state.items.length > 0 && state.items.slice(0, 5).every(item =>
        (Array.isArray(item.analyzers) && item.analyzers.length) || (Array.isArray(item.skills) && item.skills.length)
      );
    }

    function renderList() {
      if (state.view === "global") {
        renderGlobalList();
        return;
      }
      statusEl.innerHTML = state.items.length
        ? `品种决策：${state.items.length} 个活跃品种<br>当前视图使用${state.period === "day" ? "日线" : periodName(state.period)}详情`
        : "打开页面后优先复用今日缓存。";
      if (!state.items.length) {
        listEl.innerHTML = '<div class="empty">暂无活跃品种结果。</div>';
        return;
      }
      listEl.innerHTML = `
        <div class="watch-list">
          ${state.items.map((item, index) => `
            <div class="item-row ${index === state.selected ? "active" : ""}" onclick="selectItem(${index})">
              <span class="item-priority ${scoreClass(item.score)}" aria-hidden="true"></span>
              <div class="item-main">
                <div class="item-title">
                  <strong>${e(item.name)}</strong>
                  <span class="${directionClass(item)}">${directionText(item.direction)}</span>
                </div>
                <div class="item-brief ellipsis">${e(boardLabel(item))}${item.nanhua_index_code ? ` · ${e(item.nanhua_index_code)}` : ""} · ${e(item.actual_symbol || item.symbol || "-")}</div>
              </div>
              <span class="item-score">${e(item.score ?? "-")}</span>
            </div>
          `).join("")}
        </div>
        <div class="legend">
          <span>关注分 80+ 高 · 70–79 中 · &lt;70 低</span>
        </div>
      `;
    }

    function renderGlobalList() {
      statusEl.textContent = "大盘首页 · 点击名称旁箭头展开走势（180日）";
      listEl.innerHTML = "";
    }

    function selectItem(index) {
      state.selected = index;
      state.matrixCell = null;
      state.detailPillar = "overview";
      state.seasonalHiddenYears = {};
      renderList();
      renderCurrent();
    }

    function setDetailPillar(pillarId) {
      state.detailPillar = pillarId;
      renderCurrent();
    }

    function setPeriod(period) {
      state.period = period === "hour" ? "day" : period;
      renderCurrent();
    }

    function renderGlobalMarket() {
      const data = state.global;
      if (!data) {
        detailEl.innerHTML = '<div class="empty">暂无大盘首页数据，点击“刷新大盘”获取。</div>';
        return;
      }

      const nanhua = data.nanhua_indices || [];
      const nanhuaTableRows = sortNanhuaDisplayRows(filterNanhuaTableRows(nanhua));
      const nanhuaLeafRows = sortNanhuaDisplayRows(filterNanhuaLeafRows(nanhua));
      const drivers = data.drivers || [];
      const driverGroups = groupDriversByCategory(drivers);

      detailEl.innerHTML = `
        <div class="dashboard">
          <div class="global-meta-bar">
            <span>大盘首页 · ${data.from_cache ? "使用缓存" : "最新数据"}</span>
            <span>刷新时间：${e(data.refreshed_at || "-")}</span>
            <span>${nanhuaTableRows.length} 个南华指数 · ${drivers.length} 个核心变量</span>
          </div>

          <section class="decision-band narrative-panel">
            <div class="band-title">走势解读</div>
            <div class="narrative-list">
              ${renderNarrativeList(data.narrative)}
            </div>
          </section>

          <div class="zone-title">南华商品指数</div>
          <section class="evidence-card">
            ${renderNanhuaIndexSection(nanhua, nanhuaTableRows, nanhuaLeafRows)}
          </section>

          <div class="zone-title">板块品种梯队</div>
          <section class="evidence-card">
            ${renderBoardProductMatrix(data.board_product_matrix)}
          </section>

          <div class="zone-title">核心变量</div>
          <section class="evidence-card">
            ${driverGroups.length
              ? renderDriverGroupsMatrix(driverGroups)
              : emptySmall("暂无核心变量。")}
          </section>

          ${renderGlobalMacroSection(data.macro)}

          ${(data.errors || []).length ? `
            <section>
              <div class="module-head"><h3>数据源提示</h3></div>
              <p class="module-sub">${(data.errors || []).map(row => `${e(row.source)}：${e(row.message)}`).join("；")}</p>
            </section>
          ` : ""}
        </div>
      `;
      bindRowCharts(data);
      bindNanhuaNormalizedChart(nanhuaLeafRows);
    }

    function nanhuaRowCode(row) {
      return String(row?.index_code || row?.id || "").replace(/\.NH$/i, "").replace(/\.CCI$/i, "");
    }

    function isNanhuaOverallRow(row) {
      return nanhuaRowCode(row) === "NHCI" || row?.group === "总指数";
    }

    function isNanhuaLeafRow(row) {
      return NANHUA_LEAF_CODES.has(nanhuaRowCode(row));
    }

    function filterNanhuaTableRows(rows) {
      return (rows || []).filter(row => isNanhuaOverallRow(row) || isNanhuaLeafRow(row));
    }

    function filterNanhuaLeafRows(rows) {
      return (rows || []).filter(isNanhuaLeafRow);
    }

    function sortNanhuaDisplayRows(rows) {
      return [...(rows || [])].sort(
        (a, b) => (NANHUA_TABLE_ORDER[nanhuaRowCode(a)] ?? 99) - (NANHUA_TABLE_ORDER[nanhuaRowCode(b)] ?? 99)
      );
    }

    function renderNarrativeList(narrative) {
      if (narrative && typeof narrative === "object" && !Array.isArray(narrative) && narrative.sections?.length) {
        const sections = narrative.sections.filter(section => (section.items || []).length);
        if (!sections.length) return emptySmall("暂无解读。");
        return sections.map(section => renderNarrativeSection(section)).join("");
      }

      const items = (Array.isArray(narrative) ? narrative : []).map(normalizeNarrativeRow).filter(row => row.text);
      if (!items.length) return emptySmall("暂无解读。");
      return `
        <div class="narrative-section">
          <div class="narrative-section-title">解读</div>
          ${renderNarrativeItems(items)}
        </div>
      `;
    }

    function renderNarrativeSection(section) {
      const items = (section.items || []).map(normalizeNarrativeRow).filter(row => row.text);
      if (!items.length) return "";
      const sectionClass = section.key === "verify" ? "narrative-section verify" : "narrative-section";
      return `
        <div class="${sectionClass}">
          <div class="narrative-section-title">${e(section.title || section.key || "解读")}</div>
          ${renderNarrativeItems(items)}
        </div>
      `;
    }

    function renderNarrativeItems(items) {
      return `
        <ul class="insight-hit-list">
          ${items.map(row => `
            <li class="insight-hit-item">
              <span class="insight-hit-name">${e(row.label)}</span>
              <span class="insight-hit-desc">${e(row.text)}</span>
            </li>
          `).join("")}
        </ul>
      `;
    }

    function normalizeNarrativeRow(row) {
      if (row && typeof row === "object" && !Array.isArray(row)) {
        return {
          label: String(row.label || "解读").trim() || "解读",
          text: String(row.text || "").trim(),
        };
      }
      const text = String(row || "").trim();
      if (!text) return { label: "解读", text: "" };
      const splitters = [
        ["宏观窗口：", "宏观窗口"],
        ["下一宏观事件：", "宏观日历"],
        ["板块上，", "板块轮动"],
      ];
      for (const [prefix, label] of splitters) {
        if (text.startsWith(prefix)) {
          return { label, text: text.slice(prefix.length).trim() };
        }
      }
      if (text.startsWith("原油")) {
        return { label: "原油", text: text.replace(/^原油/, "").trim() };
      }
      if (text.includes("10年期国债")) {
        return { label: "海外利率", text };
      }
      if (text.includes("人民币中间价")) {
        return { label: "汇率", text };
      }
      if (text.includes("南华商品") || text.includes("商品指数")) {
        return { label: "商品整体", text };
      }
      const colonIdx = text.indexOf("：");
      if (colonIdx > 0 && colonIdx <= 8) {
        return {
          label: text.slice(0, colonIdx).trim(),
          text: text.slice(colonIdx + 1).trim(),
        };
      }
      return { label: "解读", text };
    }

    function renderGlobalMacroSection(macro) {
      const zoneHead = `<div class="zone-title">宏观发布与日历</div>`;
      if (!macro || macro.status === "unavailable") {
        return `
          ${zoneHead}
          <section class="evidence-card">
            ${emptySmall("宏观数据拉取失败，可稍后刷新大盘重试。")}
          </section>
        `;
      }
      const snapshot = macro.snapshot || {};
      const calendar = macro.calendar || {};
      const releases = snapshot.releases || [];
      const upcoming = (calendar.upcoming || []).slice(0, 10);
      const usReleases = releases.filter(row => row.region === "美国");
      const cnReleases = releases.filter(row => row.region === "中国");
      const leadParts = [];
      if (calendar.risk_window_48h) leadParts.push("48h 内有重要数据");
      if (calendar.next_event) {
        const next = calendar.next_event;
        leadParts.push(`下一事件 ${next.date || ""} ${next.title || ""}`.trim());
      }
      return `
        ${zoneHead}
        <section class="macro-bar evidence-card">
          <p class="module-sub subtle">更新 ${e(macro.refreshed_at || "-")}</p>
          <p class="macro-bar-lead">${leadParts.length ? e(leadParts.join(" · ")) : "中美关键宏观发布与未来 7 日重要事件"}</p>

          ` : ""}
          ${!releases.length ? emptySmall("暂无宏观发布数据。") : ""}
          <div class="macro-calendar-block">

            ${upcoming.length ? `
              <ul class="macro-event-list">
                ${upcoming.map(ev => `
                  <li>
                    <span class="k">${e(ev.date || "")} ${e(ev.time || "")}</span>
                    ${e(ev.region || "")} · ${e(ev.title || "")}
                    ${ev.importance >= 3 ? `<span class="chip warning">高</span>` : ""}

    function renderMacroReleaseTable(releases) {
      return `
        <div class="change-matrix-wrap">
          <table class="change-matrix compact macro-release-table">
            <thead>
              <tr>
                <th>指标</th>
                <th>公布日</th>
                <th>实际</th>
                <th>预期</th>
                <th>前值</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody>
              ${releases.map(row => {
                const actualClass = row.beat === "above" ? "beat-above" : row.beat === "below" ? "beat-below" : "";
                return `
                  <tr>
                    <td class="name-cell">${e(row.title || "-")}</td>
                    <td>${e(formatMacroDate(row.date))}</td>
                    <td class="${actualClass}">${formatMacroValue(row.actual, row.unit)}</td>
                    <td>${formatMacroValue(row.forecast, row.unit)}</td>
                    <td>${formatMacroValue(row.previous, row.unit)}</td>
                    <td>${row.pending ? '<span class="pending">待公布</span>' : row.beat === "above" ? "高于预期" : row.beat === "below" ? "低于预期" : "已公布"}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function formatMacroValue(value, unit) {
      if (value === null || value === undefined || value === "") return "-";
      const text = String(value);
      if (!unit || unit === "%") return `${text}${unit || ""}`;
      return `${text} ${unit}`;
    }

    function formatMacroDate(value) {
      if (!value) return "-";
      const text = String(value);
      return text.length >= 10 ? text.slice(0, 10) : text;
    }

    function chartCanvasId(id) {
      return `row-chart-${String(id).replace(/[^a-zA-Z0-9_-]/g, "_")}`;
    }

    function bindRowCharts(data) {
      const id = state.globalOpenChartId;
      if (!id) return;
      const row = allGlobalSeries(data).find(item => item.id === id);
      if (!row?.chart?.length) return;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const canvas = document.getElementById(chartCanvasId(id));
          if (canvas) drawMiniLine(canvas, row.chart, row.tone, 180, true);
        });
      });
    }

    function bindNanhuaNormalizedChart(rows) {
      if (!rows?.length) return;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          syncNanhuaPanelLayout(rows);
        });
      });
    }

    function ytdStartIso() {
      return `${new Date().getFullYear()}-01-01`;
    }

    function filterChartToYtd(chart) {
      const start = ytdStartIso();
      return (chart || []).filter(point => String(point.time).slice(0, 10) >= start);
    }

    function buildNanhuaNormalizedSeries(rows) {
      const chartRows = rows.filter(row => filterChartToYtd(row.chart).length);
      if (!chartRows.length) return { times: [], series: [] };

      const timeSet = new Set();
      chartRows.forEach(row => filterChartToYtd(row.chart).forEach(point => timeSet.add(String(point.time))));
      const times = [...timeSet].sort();

      const series = chartRows.map((row, index) => {
        const ytdChart = filterChartToYtd(row.chart);
        const valueMap = new Map(
          ytdChart.map(point => [String(point.time), Number(point.value)]).filter(([, value]) => Number.isFinite(value))
        );
        const aligned = times.map(time => valueMap.get(time));
        const baseIndex = aligned.findIndex(value => Number.isFinite(value));
        if (baseIndex < 0) return null;
        const base = aligned[baseIndex];
        return {
          id: row.id,
          name: row.name,
          code: formatIndexCode(row),
          color: NANHUA_CHART_COLORS[index % NANHUA_CHART_COLORS.length],
          values: aligned.map(value => (Number.isFinite(value) ? (value / base) * 100 : null)),
        };
      }).filter(Boolean);

      return { times, series };
    }

    function syncNanhuaPanelLayout(rows) {
      const left = document.querySelector(".nanhua-index-left");
      const right = document.querySelector(".nanhua-index-right");
      const canvas = document.getElementById("nanhua-normalized-chart");
      if (!left || !right || !canvas) return;

      right.style.height = "";
      canvas.style.height = "";

      const leftHeight = Math.ceil(left.getBoundingClientRect().height);
      right.style.height = `${leftHeight}px`;

      const headEl = right.querySelector(".nanhua-chart-head");
      const legendEl = right.querySelector(".nanhua-chart-legend");
      const panelStyle = window.getComputedStyle(right);
      const padY = parseFloat(panelStyle.paddingTop) + parseFloat(panelStyle.paddingBottom);
      const headH = headEl ? headEl.offsetHeight + 8 : 0;
      const legendH = legendEl ? legendEl.offsetHeight + 8 : 0;
      const chartHeight = Math.max(160, leftHeight - padY - headH - legendH);
      canvas.style.height = `${chartHeight}px`;

      drawNanhuaNormalizedChart(canvas, rows);
      if (!window._nanhuaResizeBound) {
        window._nanhuaResizeBound = true;
        window.addEventListener("resize", () => {
          if (state.view !== "global" || !(state.global?.nanhua_indices || []).length) return;
          const leafRows = sortNanhuaDisplayRows(filterNanhuaLeafRows(state.global.nanhua_indices));
          syncNanhuaPanelLayout(leafRows);
        });
      }
    }

    function drawNanhuaNormalizedChart(canvas, rows) {
      const { times, series } = buildNanhuaNormalizedSeries(rows);
      if (!canvas || !times.length || !series.length) return;

      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const width = Math.max(280, Math.floor(rect.width));
      const height = Math.max(160, Math.floor(rect.height));
      const flatValues = series.flatMap(item => item.values.filter(Number.isFinite));
      if (!flatValues.length) return;

      let yMin = Math.min(...flatValues);
      let yMax = Math.max(...flatValues);
      if (Math.abs(yMax - yMin) < 0.5) {
        yMin -= 1;
        yMax += 1;
      } else {
        const padding = Math.max((yMax - yMin) * 0.08, 0.5);
        yMin -= padding;
        yMax += padding;
      }
      const ySpan = Math.max(yMax - yMin, 1);
      const pad = { left: 46, right: 14, top: 14, bottom: 30 };
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;
      const xAt = index => pad.left + (times.length <= 1 ? 0 : index / (times.length - 1) * plotW);
      const yAt = value => pad.top + (yMax - value) / ySpan * plotH;

      canvas._nanhuaChartMeta = { times, series, width, height, ratio, pad, plotW, plotH, xAt, yAt, yMin, yMax, ySpan };
      renderNanhuaChart(canvas, canvas._nanhuaChartMeta);
      bindNanhuaChartHover(canvas);
    }

    function bindNanhuaChartHover(canvas) {
      if (canvas._nanhuaHoverBound) return;
      canvas._nanhuaHoverBound = true;
      canvas.addEventListener("mousemove", event => {
        const meta = canvas._nanhuaChartMeta;
        if (!meta) return;
        const rect = canvas.getBoundingClientRect();
        const localX = event.clientX - rect.left;
        let best = 0;
        let bestDist = Infinity;
        meta.times.forEach((_, index) => {
          const dist = Math.abs(meta.xAt(index) - localX);
          if (dist < bestDist) {
            bestDist = dist;
            best = index;
          }
        });
        renderNanhuaChartHover(canvas, meta, best);
      });
      canvas.addEventListener("mouseleave", () => {
        const meta = canvas._nanhuaChartMeta;
        if (!meta) return;
        renderNanhuaChart(canvas, meta);
      });
    }

    function renderNanhuaChart(canvas, meta) {
      const ctx = canvas.getContext("2d");
      const ratio = meta.ratio || window.devicePixelRatio || 1;
      const { times, series, width, height, pad, plotW, plotH, xAt, yAt, yMin, yMax, ySpan } = meta;
      canvas.width = width * ratio;
      canvas.height = height * ratio;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.clearRect(0, 0, width, height);

      ctx.strokeStyle = "#eef1f5";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const tick = yMin + ySpan * i / 4;
        const yy = yAt(tick);
        ctx.beginPath();
        ctx.moveTo(pad.left, yy);
        ctx.lineTo(width - pad.right, yy);
        ctx.stroke();
      }

      series.forEach(item => {
        ctx.strokeStyle = item.color;
        ctx.lineWidth = item.code === "NHCI" ? 2.4 : 1.6;
        ctx.beginPath();
        let started = false;
        item.values.forEach((value, index) => {
          if (!Number.isFinite(value)) return;
          const px = xAt(index);
          const py = yAt(value);
          if (!started) {
            ctx.moveTo(px, py);
            started = true;
          } else {
            ctx.lineTo(px, py);
          }
        });
        ctx.stroke();
      });

      ctx.fillStyle = "#9a9084";
      ctx.font = "11px PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let i = 0; i <= 4; i++) {
        const tick = yMin + ySpan * i / 4;
        ctx.fillText(tick.toFixed(1), pad.left - 8, yAt(tick));
      }

      const xTickIndices = chartDateTickIndices(times.length, 4);
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      xTickIndices.forEach(index => {
        const label = String(times[index] || "").slice(0, 10);
        if (!label) return;
        ctx.fillText(label, xAt(index), height - pad.bottom + 6);
      });

      const baselineY = yAt(100);
      if (baselineY >= pad.top && baselineY <= pad.top + plotH) {
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = "#d8dde3";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.left, baselineY);
        ctx.lineTo(width - pad.right, baselineY);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    function renderNanhuaChartHover(canvas, meta, hoverIndex) {
      renderNanhuaChart(canvas, meta);
      const ctx = canvas.getContext("2d");
      const ratio = window.devicePixelRatio || 1;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      const { times, series, width, height, pad, plotH, xAt, yAt } = meta;
      const px = xAt(hoverIndex);
      const dateLabel = String(times[hoverIndex] || "").slice(0, 10);

      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = "#c4a574";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px, pad.top);
      ctx.lineTo(px, pad.top + plotH);
      ctx.stroke();
      ctx.setLineDash([]);

      series.forEach(item => {
        const value = item.values[hoverIndex];
        if (!Number.isFinite(value)) return;
        const py = yAt(value);
        ctx.fillStyle = item.color;
        ctx.beginPath();
        ctx.arc(px, py, 3.5, 0, Math.PI * 2);
        ctx.fill();
      });

      const lines = series
        .map(item => {
          const value = item.values[hoverIndex];
          if (!Number.isFinite(value)) return null;
          return `${item.code} ${value.toFixed(2)}`;
        })
        .filter(Boolean);
      if (!lines.length) return;

      const tip = `${dateLabel}\n${lines.join("  ")}`;
      ctx.font = "11px PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif";
      const tipLines = tip.split("\n");
      const tipW = Math.max(...tipLines.map(line => ctx.measureText(line).width)) + 16;
      const tipH = 16 + tipLines.length * 14;
      let tipX = px - tipW / 2;
      tipX = Math.max(pad.left, Math.min(tipX, width - pad.right - tipW));
      const tipY = pad.top + 6;
      ctx.fillStyle = "rgba(255,255,255,0.96)";
      ctx.strokeStyle = "#e4ddd2";
      ctx.lineWidth = 1;
      roundRect(ctx, tipX, tipY, tipW, tipH, 6);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#4a4035";
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      tipLines.forEach((line, index) => {
        ctx.fillText(line, tipX + 8, tipY + 8 + index * 14);
      });
    }

    function toggleRowChart(id) {
      state.globalOpenChartId = state.globalOpenChartId === id ? null : id;
      renderGlobalMarket();
    }

    function toggleBoardProductExpand(code) {
      state.boardProductExpanded[code] = !state.boardProductExpanded[code];
      renderGlobalMarket();
    }

    function openProductFromSymbol(symbol) {
      if (!symbol) return;
      const idx = state.items.findIndex(item => item.symbol === symbol);
      if (idx < 0) return;
      state.selected = idx;
      setView("watch");
    }

    function renderBoardProductMatrix(matrix) {
      const rows = (matrix?.rows || []).filter(row => !row.composite && !NANHUA_COMPOSITE_CODES.has(row.code));
      if (!rows.length || matrix?.status === "empty") {
        return emptySmall("暂无品种梯队数据。请先刷新品种盯控，再刷新大盘。");
      }
      const previewLimit = matrix?.preview_limit || 10;
      return `
        <div class="board-product-matrix">
          ${rows.map(row => renderBoardProductRow(row, previewLimit)).join("")}
        </div>
      `;
    }

    function renderBoardProductRow(row, previewLimit) {
      const expanded = !!state.boardProductExpanded[row.code];
      const products = expanded ? (row.products || []) : (row.preview || row.products || []).slice(0, previewLimit);
      const hiddenCount = expanded ? 0 : Math.max(0, (row.product_count || 0) - products.length);
      const scale = buildRowHeatmapScale(row.products || products);
      const indexChange = row.index_change_5d;
      const indexChangeHtml = Number.isFinite(Number(indexChange))
        ? `<span class="idx-change ${cnChangeClass(indexChange)}">指数5日 ${formatChange(indexChange)}</span>`
        : `<span class="idx-change">指数5日 -</span>`;

      if (!products.length) {
        return `
          <div class="board-product-row">
            <div class="board-product-head">
              <div class="board-product-name">${e(row.name || row.code)}</div>
              <div class="board-product-meta">${e(row.code || "")} · ${indexChangeHtml}</div>
            </div>
            <div class="board-product-body">
              <div class="board-product-empty">暂无可用品种数据</div>
            </div>
          </div>
        `;
      }

      return `
        <div class="board-product-row">
          <div class="board-product-head">
            <div class="board-product-name">${e(row.name || row.code)}</div>
            <div class="board-product-meta">
              ${e(row.code || "")} · ${indexChangeHtml}<br>
              ${row.product_count || products.length} 个品种 · 近5日涨幅排序
            </div>
          </div>
          <div class="board-product-body">
            <div class="board-product-chips ${expanded || hiddenCount === 0 ? "" : "collapsed"}">
              ${products.map(product => renderBoardProductChip(product, scale)).join("")}
            </div>
            ${hiddenCount > 0 ? `
              <div class="board-product-actions">
                <button type="button" class="board-product-toggle" data-toggle-board-products="${e(row.code)}">
                  展开剩余 ${hiddenCount} 个
                </button>
              </div>
            ` : expanded && (row.product_count || 0) > previewLimit ? `
              <div class="board-product-actions">
                <button type="button" class="board-product-toggle" data-toggle-board-products="${e(row.code)}">
                  收起
                </button>
              </div>
            ` : ""}
          </div>
        </div>
      `;
    }

    function buildRowHeatmapScale(products) {
      const scale = { maxPos: 1e-9, maxNeg: 1e-9 };
      (products || []).forEach(product => {
        const n = parseChangeNumber(product?.change_5d);
        if (n === null) return;
        if (n > 0) scale.maxPos = Math.max(scale.maxPos, n);
        if (n < 0) scale.maxNeg = Math.max(scale.maxNeg, Math.abs(n));
      });
      return scale;
    }

    function renderBoardProductChip(product, scale) {
      const value = product?.change_5d;
      const n = parseChangeNumber(value);
      let style = "";
      if (n !== null) {
        const { dir, t } = heatmapIntensity(n, scale);
        const colors = heatmapCellColors(dir, t);
        style = ` style="background:${colors.bg};color:${colors.color};border-color:transparent;"`;
      }
      return `
        <button type="button" class="board-product-chip"${style} data-open-product="${e(product.symbol || "")}" title="${e(product.name || "")} · ${formatChange(value)}">
          <span class="chip-name">${e(product.name || "-")}</span>
          <span class="chip-change">${formatChange(value)}</span>
        </button>
      `;
    }

    function renderNanhuaIndexSection(rows, tableRows, leafRows) {
      const source = rows || [];
      const summaryRows = tableRows || sortNanhuaDisplayRows(filterNanhuaTableRows(source));
      const heatmapRows = leafRows || sortNanhuaDisplayRows(filterNanhuaLeafRows(source));
      if (!summaryRows.length) {
        const errRows = state.global?.errors || [];
        const nanhuaErr = errRows.find((row) => row.source === "nanhua_indices");
        if (nanhuaErr?.message) {
          return emptySmall(`南华指数暂不可用：${e(nanhuaErr.message)}`);
        }
        return emptySmall("暂无南华指数数据。若 .env 已配置 TUSHARE_TOKEN，请点击右上角「刷新大盘」更新缓存。");
      }
      return `
        <div class="index-series-stack">
          <div class="index-series-block">
            <div class="index-series-head">
              <h4 class="group-title">南华板块指数</h4>
            </div>
            <div class="nanhua-index-layout">
              <div class="nanhua-index-panel nanhua-index-left">
                ${renderPeriodMatrix(summaryRows, {
                  fullName: true,
                  showCode: true,
                  showLevel: false,
                  showGroup: false,
                  showConstituents: false,
                  hideChartToggle: true,
                  matrixClass: "nanhua-matrix",
                  heatmap: false,
                })}
                <div class="nanhua-heatmap-block">
                  <p class="nanhua-heatmap-label">板块涨跌幅热力图</p>
                  ${renderPeriodMatrix(heatmapRows, {
                    fullName: true,
                    showCode: false,
                    showLatest: false,
                    showLevel: false,
                    showGroup: false,
                    showConstituents: false,
                    hideChartToggle: true,
                    matrixClass: "nanhua-matrix nanhua-heatmap-matrix",
                    heatmap: true,
                  })}
                </div>
              </div>
              <div class="nanhua-index-panel nanhua-index-right">
                <div class="nanhua-chart-head">
                  <span class="nanhua-chart-title">今年以来走势</span>
                  <span class="nanhua-chart-sub">归一化 · 起点=100 · 叶子板块</span>
                </div>
                <canvas id="nanhua-normalized-chart"></canvas>
                <div class="nanhua-chart-legend">
                  ${heatmapRows.map((row, index) => `
                    <span class="nanhua-legend-item" title="${e(row.name || "")}">
                      <span class="nanhua-legend-dot" style="background:${NANHUA_CHART_COLORS[index % NANHUA_CHART_COLORS.length]}"></span>
                      ${e(formatIndexCode(row))}
                    </span>
                  `).join("")}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function formatIndexCode(row) {
      return row.index_code || String(row.id || "").replace(".CCI", "").replace(".NH", "") || "-";
    }

    function allGlobalSeries(data) {
      return [...(data.nanhua_indices || []), ...(data.drivers || [])].filter(Boolean);
    }

    function groupDriversByCategory(drivers) {
      const grouped = new Map();
      drivers.forEach(row => {
        const name = row.group || "其他";
        if (!grouped.has(name)) grouped.set(name, []);
        grouped.get(name).push(row);
      });
      const ordered = [];
      DRIVER_GROUP_ORDER.forEach(name => {
        if (grouped.has(name)) {
          ordered.push({ name, rows: grouped.get(name) });
          grouped.delete(name);
        }
      });
      grouped.forEach((rows, name) => ordered.push({ name, rows }));
      return ordered;
    }

    function matrixColCount(options = {}) {
      const showConstituents = options.showConstituents === true;
      const showCode = options.showCode === true;
      const showLevel = matrixShowLevel(options);
      const showLatest = options.showLatest !== false;
      return 1 + (showCode ? 1 : 0) + (showLevel ? 1 : 0) + (showLatest ? 1 : 0) + GLOBAL_PERIOD_COLS.length + (showConstituents ? 1 : 0);
    }

    function matrixShowLevel(options = {}) {
      if (options.showLevel != null) return options.showLevel === true;
      return options.showGroup !== false;
    }

    function renderMatrixRows(rows, options = {}) {
      const fullName = options.fullName === true;
      const showConstituents = options.showConstituents === true;
      const showCode = options.showCode === true;
      const showLevel = matrixShowLevel(options);
      const nameClass = fullName ? "name-cell full-name" : "name-cell";
      const colCount = matrixColCount(options);
      const heatmapScales = options.heatmapScales || null;
      const showLatest = options.showLatest !== false;
      return rows.map(row => {
        const expanded = state.globalExpandedIndexId === row.id;
        const chartOpen = !options.hideChartToggle && state.globalOpenChartId === row.id;
        const constituents = row.constituents;
        const count = constituents?.product_count || (constituents?.products || []).length || 0;
        return `
          <tr class="change-matrix-row ${chartOpen ? "chart-open" : ""} ${expanded ? "expanded" : ""}">
            <td class="${nameClass}">
              <div class="matrix-name-block">
                <div class="matrix-name-line">
                  <div class="matrix-name" title="${e(row.name || "")}">${e(displayGlobalName(row))}</div>
                  ${!options.hideChartToggle && row.chart?.length ? `
                    <button
                      type="button"
                      class="chart-toggle row-chart-toggle icon-only ${chartOpen ? "open" : ""}"
                      data-toggle-chart="${e(row.id)}"
                      aria-label="${chartOpen ? "收起近180日走势" : "展开近180日走势"}"
                      title="${chartOpen ? "收起走势" : "展开走势"}"
                    >
                      <span class="chart-chevron" aria-hidden="true"></span>
                    </button>
                  ` : ""}
                </div>
              </div>
            </td>
            ${showCode ? `<td class="code-cell">${e(formatIndexCode(row))}</td>` : ""}
            ${showLevel ? `<td class="group-cell">${e(row.level || row.group || "-")}</td>` : ""}
            ${showLatest ? `<td class="latest-cell">${e(row.value_label || "-")}</td>` : ""}
            ${GLOBAL_PERIOD_COLS.map(col => renderChangeCell(
              row.changes?.[col.key],
              row.change_kind,
              heatmapScales?.[col.key]
            )).join("")}
            ${showConstituents ? `

    function renderPeriodMatrix(rows, options = {}) {
      if (!rows.length) return emptySmall("暂无数据。");
      const compact = options.compact === true;
      const showConstituents = options.showConstituents === true;
      const showCode = options.showCode === true;
      const showLevel = matrixShowLevel(options);
      const showLatest = options.showLatest !== false;
      const levelHeader = showLevel ? "<th>层级</th>" : "";
      const codeHeader = showCode ? "<th>代码</th>" : "";
      const latestHeader = showLatest ? "<th>最新</th>" : "";
      const constituentHeader = showConstituents ? "<th>成分</th>" : "";
      const extraClass = options.matrixClass ? ` ${options.matrixClass}` : "";
      const heatmapScales = options.heatmap === true
        ? buildHeatmapScales(rows, GLOBAL_PERIOD_COLS.map(col => col.key))
        : null;
      const rowOptions = { ...options, heatmapScales };
      return `
        <div class="change-matrix-wrap">
          <table class="change-matrix ${compact ? "compact" : ""}${extraClass}">
            <thead>
              <tr>
                <th>名称</th>
                ${codeHeader}
                ${levelHeader}
                ${latestHeader}
                ${GLOBAL_PERIOD_COLS.map(col => `<th>${col.label}</th>`).join("")}
                ${constituentHeader}
              </tr>
            </thead>
            <tbody>
              ${renderMatrixRows(rows, rowOptions)}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderDriverGroupsMatrix(groups) {

      const rowOptions = { ...options, heatmapScales };

    function renderConstituentBlock(constituents, mode = "inline") {
      const groups = constituents?.groups || [];
      if (!groups.length) return emptySmall("暂无成分说明。");
      return `
        <div class="constituent-block ${mode}">
          <p class="constituent-scope">${e(constituents.scope || "")}</p>
          <div class="constituent-groups">

              <div class="constituent-group">
                <div class="constituent-group-label">${e(group.board || "成分")}</div>

    function toggleGlobalIndexExpand(id) {
      state.globalExpandedIndexId = state.globalExpandedIndexId === id ? null : id;
      renderGlobalMarket();
    }

    function displayGlobalName(row) {

    }

    function renderChangeCell(value, kind = "pct", heatmapScale = null) {
      if (heatmapScale) return renderHeatmapChangeCell(value, kind, heatmapScale);
      const cls = cnChangeClass(value);
      return `<td class="change-cell ${cls}">${formatChange(value, kind)}</td>`;
    }

    function parseChangeNumber(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function buildHeatmapScales(rows, periodKeys) {
      const scales = {};
      periodKeys.forEach(key => {
        const buckets = {
          pct: { maxPos: 1e-9, maxNeg: 1e-9 },
          diff_bp: { maxPos: 1e-9, maxNeg: 1e-9 },
        };
        (rows || []).forEach(row => {
          const kind = row?.change_kind || "pct";
          const bucket = buckets[kind] || buckets.pct;
          const n = parseChangeNumber(row?.changes?.[key]);
          if (n === null) return;
          if (n > 0) bucket.maxPos = Math.max(bucket.maxPos, n);
          if (n < 0) bucket.maxNeg = Math.max(bucket.maxNeg, Math.abs(n));
        });
        scales[key] = buckets;
      });
      return scales;
    }

    function resolveHeatmapScale(scale, kind = "pct") {
      if (!scale) return null;
      if (scale.maxPos != null) return scale;
      return scale[kind] || scale.pct;
    }

    function heatmapIntensity(value, scale) {
      const n = parseChangeNumber(value);
      if (n === null || n === 0) return { dir: "flat", t: 0 };
      if (n > 0) return { dir: "rise", t: Math.min(1, n / scale.maxPos) };
      return { dir: "fall", t: Math.min(1, Math.abs(n) / scale.maxNeg) };
    }

    function heatmapCellColors(dir, t) {
      const minAlpha = 0.28;
      const maxAlpha = 0.82;
      const alpha = minAlpha + t * (maxAlpha - minAlpha);
      if (dir === "rise") {
        return {
          bg: `rgba(184, 50, 50, ${alpha.toFixed(3)})`,
          color: "#fff",
        };
      }
      if (dir === "fall") {
        return {
          bg: `rgba(45, 106, 62, ${alpha.toFixed(3)})`,
          color: "#fff",
        };
      }
      return {
        bg: "var(--neutral-soft)",
        color: "var(--subtle)",
      };
    }

    function renderHeatmapChangeCell(value, kind, scale) {
      const bucket = resolveHeatmapScale(scale, kind);
      if (!bucket) {
        const cls = cnChangeClass(value);
        return `<td class="change-cell ${cls}">${formatChange(value, kind)}</td>`;
      }
      const n = parseChangeNumber(value);
      if (n === null) {
        return `<td class="change-cell heatmap-cell flat">-</td>`;
      }
      const { dir, t } = heatmapIntensity(n, bucket);
      const colors = heatmapCellColors(dir, t);
      return `<td class="change-cell heatmap-cell ${dir}" style="background:${colors.bg};color:${colors.color};">${formatChange(value, kind)}</td>`;
    }

    function cnChangeClass(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "flat";
      if (n > 0) return "rise";
      if (n < 0) return "fall";
      return "flat";
    }

    function cnToneChip(tone) {
      if (tone === "up") return "danger";
      if (tone === "down") return "success";
      return "info";
    }

    function renderDetail() {
      const item = state.items[state.selected];
      if (!item) {
        detailEl.innerHTML = '<div class="empty">暂无详情。</div>';
        return;
      }

      const skills = normalizeSkills(item);
      const byId = Object.fromEntries(skills.map(skill => [skill.id, skill]));
      const tables = collectDetailTables(skills);
      const pillar = ["views", "macro"].includes(state.detailPillar) ? "overview" : (state.detailPillar || "overview");

      detailEl.innerHTML = `
        <div class="dashboard">
          ${renderDetailHeader(item)}
          ${renderPillarNav(pillar, byId, skills)}
          <div class="pillar-panel">
            ${renderPillarContent(pillar, item, byId, skills, tables)}
          </div>
        </div>
      `;
      bindKlinePanel(item);
      const termSkill = byId.term_structure;
      if (pillar === "capital" && termSkill && termSkill.status !== "unavailable") {
        bindTermStructureChart(termSkill);
      }
      if (pillar === "seasonal") {
        bindSeasonalChart(byId.seasonality);
      }
    }

    function renderPillarNav(active, byId, skills) {
      return `
        <nav class="pillar-nav" aria-label="品种分析维度">
          ${DETAIL_PILLARS.map(pillar => `
            <button
              type="button"
              class="pillar-tab ${pillar.id === active ? "active" : ""}"
              onclick="setDetailPillar('${pillar.id}')"
            >${e(pillar.label)}${renderPillarBadge(pillar, byId, skills)}</button>
          `).join("")}
        </nav>
      `;
    }

    function renderPillarBadge(pillar, byId, skills) {
      const count = countPillarModules(pillar, byId, skills).filter(row => row.available).length;
      return count ? `<span class="pillar-count">${count}</span>` : "";
    }

    function countPillarModules(pillar, byId, skills) {
      if (pillar.idPrefix) {
        return skills.filter(skill => String(skill.id || "").startsWith(pillar.idPrefix)).map(skill => ({
          id: skill.id,
          available: moduleAvailable(skill),
        }));
      }
      const rows = (pillar.moduleIds || []).map(id => ({ id, available: moduleAvailable(byId[id]) }));
      (pillar.extras || []).forEach(id => {
        if (id === "macro_bar") rows.push({ id, available: Boolean(state.macro && state.macro.status !== "unavailable") });
        if (id === "kline") rows.push({ id, available: true });
        if (id === "news_placeholder") rows.push({ id, available: false });
      });
      return rows;
    }

    function moduleAvailable(skill) {
      if (!skill) return false;
      if (skill.status === "unavailable") return false;
      if ((skill.signals || []).length) return true;
      if ((skill.tables || []).length) return true;
      if ((skill.charts || []).length) return true;
      if ((skill.levels || []).length) return true;
      if ((skill.gaps || []).length) return true;
      if (skill.summary && !/暂无|未接入|无法/.test(skill.summary)) return true;
      return false;
    }

    function renderPillarContent(pillarId, item, byId, skills, tables) {
      switch (pillarId) {
        case "overview":
          return `
            ${renderInsight(byId.insight || legacyInsightSkill(byId.summary, byId.research_lens, item), item)}
            ${renderDirectionMatrix(item)}
          `;
        case "market":
          return renderPillarStack([
            renderAnalyzerAccordion(byId.price_volume, skill => `
              ${renderSignalCardGrid(skill.signals, 6, "暂无量价信号。")}
            `),
            renderAnalyzerAccordion(byId.board_resonance, skill => `
              ${renderSignalGroups(skill.signals)}
              ${renderTables((skill.tables || []).slice(0, 2))}
              ${renderNotes(skill.notes)}
            `),
            renderAnalyzerAccordion(byId.technical_signals, skill => `
              ${renderSignalCardGrid(skill.signals, 6, "暂无明显技术指标阈值信号。")}
              ${renderNotes(skill.notes)}
            `),
            renderAnalyzerAccordion(byId.candlestick_patterns, skill => `
              ${renderSignalCardGrid(skill.signals, 6, "暂无显著K线形态。")}
              ${renderNotes(skill.notes)}
            `),
            renderAnalyzerAccordion(byId.key_levels, skill => `
              <div class="level-grid">${nearestLevels(skill.levels || []).map(renderLevel).join("") || emptySmall("暂无关键点位。")}</div>
            `),
            renderAccordionBlock("K线图", "需要时再展开核对形态与均线", renderKlineSection(), false),
            renderDetailTables(tables.filter(table => ["本板块品种对照", "相关板块强弱"].includes(table.title))),
          ]);
        case "fundamental":
          return renderPillarStack([
            renderKnowledgeAccordion(byId.product_framework),
            renderAnalyzerAccordion(byId.basis, skill => `
              ${renderSignalGroups(skill.signals)}
              ${renderTables(skill.tables)}
              ${renderNotes(skill.notes)}
            `),
            renderAnalyzerAccordion(byId.warehouse_receipts, skill => `
              ${renderSignalGroups(skill.signals)}
              ${renderTables(skill.tables)}
              ${renderNotes(skill.notes)}
            `),
            !moduleAvailable(byId.product_framework) && !moduleAvailable(byId.basis) && !moduleAvailable(byId.warehouse_receipts)
              ? `<div class="pillar-empty">产业数据以 Playbook 框架、期现基差与仓单库存为主；利润等尚未接入，刷新后可见品种框架推理。</div>`
              : "",
          ]);
        case "seasonal":
          return renderSeasonalityPanel(byId.seasonality);
        case "capital":
          return renderPillarStack([
            renderAccordionBlock("期限结构", byId.term_structure?.summary || "同品种期货合约链跨期价差", renderTermStructureBody(byId.term_structure), moduleAvailable(byId.term_structure)),
            renderAnalyzerAccordion(byId.position_rank, skill => `
              ${renderSignalGroups(skill.signals)}
              ${renderTables(skill.tables)}
              ${renderNotes(skill.notes)}
            `),
          ]);
        default:
          return "";
      }
    }

    function renderPillarStack(blocks) {
      const rows = blocks.filter(Boolean);
      return rows.length
        ? `<div class="pillar-stack">${rows.join("")}</div>`
        : `<div class="pillar-empty">本栏暂无内容。</div>`;

    function renderAnalyzerAccordion(skill, bodyRenderer) {

        skill.title || skill.id,
        clip(skill.summary || "暂无摘要", 72),
        bodyRenderer(skill),
        false,
        moduleAvailable(skill),
      );
    }

    function renderKnowledgeAccordion(skill) {
      if (!skill) return "";
      return renderAccordionBlock(
        skill.title || skill.id,
        clip(skill.summary || "暂无摘要", 72),
        renderKnowledgeBody(skill),
        false,
        moduleAvailable(skill),
      );
    }

    function renderKnowledgeBody(skill) {
      const gaps = (skill.gaps || []).slice(0, 4);
      return `
        ${renderSignalGroups((skill.signals || []).slice(0, 8))}
        ${gaps.length ? `<div class="module-sub" style="margin-top:10px">缺项：${gaps.map(g => e(clip(g, 48))).join(" · ")}</div>` : ""}
        ${renderNotes(skill.notes)}
