id: ur
name: 尿素
board: 能化
version: 1
sources:
  - broker: 弘业期货
    file: 20260605-弘业期货-地缘风暴下的能化机会——尿素研报系列（4）：供强需弱，尿素偏弱震荡.pdf
    date: "2026-06-05"

reasoning_chain:
  - id: cost
    title: 成本端
    focus: [固定床成本, 煤气化成本, 企业利润]
    questions:
      - 煤制/气制成本线在哪里？
      - 主流区域企业利润是否维持正区间？
    fallback: 成本线决定下方支撑，关注不同工艺完全成本与企业利润带。

  - id: supply
    title: 供给端
    focus: [开工率, 装置检修, 日产量, 煤制气制分化]
    questions:
      - 开工率是否处于90%以上高位？
      - 检修与复产哪个占主导？
    fallback: 跟踪行业及煤制、气制分项开工率与日均产量。

  - id: demand
    title: 需求端
    focus: [农业用肥, 复合肥, 三聚氰胺, 预收订单]
    questions:
      - 是否处于农忙淡季或追肥备货窗口？
      - 复合肥开工与原料备货意愿如何？
      - 企业预收订单天数是否下滑？
    fallback: 农业季节性与工业刚需（复合肥、三聚氰胺）共同决定需求节奏。

  - id: inventory
    title: 库存
    focus: [企业库存, 港口库存, 去库速度]
    skill_links: [warehouse_receipts]
    fallback: 厂库与港库方向及环比变化是供需平衡的直接体现。

  - id: export
    title: 出口与政策
    focus: [出口政策, 港口出货, 市场情绪]
    questions:
      - 出口消息是否扰动市场情绪？
      - 出口能否实质消化库存？
    fallback: 出口政策与落地节奏是尿素区别于多数化工品的关键变量。

  - id: market
    title: 盘面验证
    focus: [基差, 量价, 期限结构]
    skill_links: [price_volume, technical_signals, term_structure, key_levels]

confirmation:
  - 开工回落 + 需求季节性释放 + 库存持续去库
  - 出口政策实质放松且港口库存下降

invalidation:
  - 供强需弱延续，开工维持90%以上且需求淡季
  - 预收订单持续下滑，现货暗降促单

seasonal_notes:
  - 麦收农忙期农业需求偏淡，夏玉米追肥备货逐步推进但短期释放有限

risk_factors:
  - 宏观情绪与出口政策变化
  - 装置集中检修或复产扰动
