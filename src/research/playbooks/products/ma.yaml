id: ma
name: 甲醇
board: 能化
version: 1
sources:
  - broker: 弘业期货
    file: 20260605-弘业期货-甲醇：低供支撑，高位震荡.pdf
    date: "2026-06-05"

reasoning_chain:
  - id: cost
    title: 成本端
    focus: [煤炭价格, 天然气制, 焦炉气制, 区域利润]
    questions:
      - 煤炭偏强是否抬升内地甲醇成本？
      - 各工艺路线利润分化如何？
    fallback: 煤制、天然气制、焦炉气制利润分化影响区域供应意愿。

  - id: supply
    title: 供给端
    focus: [国产产量, 开工率, 检修复产, 进口到港]
    questions:
      - 装置复产是否带动产量回升？
      - 进口到港是否集中增加？
    fallback: 国产开工与进口到港共同决定总供应，关注两者共振放量。

  - id: demand
    title: 需求端
    focus: [MTO开工, 传统下游, 甲醛, 醋酸, 刚需采购]
    questions:
      - MTO是否深度亏损并降负停车？
      - 传统下游对高价甲醇是否抵触？
    fallback: MTO是核心需求，亏损时会形成明显负反馈。

  - id: inventory
    title: 库存
    focus: [内地厂库, 港口库存, 去库累库]
    skill_links: [warehouse_receipts]
    fallback: 港口与内地库存是否同步去化，决定现货支撑强弱。

  - id: geopolitics
    title: 地缘与贸易
    focus: [进口来源, 伊朗局势, 出口]
    questions:
      - 地缘扰动是否带来风险溢价？
      - 谈判缓和后溢价是否回落？
    fallback: 甲醇进口依赖度高，地缘是盘面情绪重要变量。

  - id: market
    title: 盘面验证
    skill_links: [price_volume, technical_signals, term_structure, key_levels, position_rank]

confirmation:
  - 低库存 + 产区现货偏紧 + MTO局部重启
  - 成本支撑有效且港口继续去库

invalidation:
  - 国产复产叠加进口集中到港，总供应放量
  - MTO大面积停车，港口由去库转累库

seasonal_notes:
  - 关注冬季天然气制甲醇限气及春季检修窗口

risk_factors:
  - 国际地缘与进口物流
  - MTO装置开停车集中变化
