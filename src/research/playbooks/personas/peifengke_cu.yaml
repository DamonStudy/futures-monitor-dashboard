reasoning_chain:
- id: time_horizon
  title: 先分时间尺度
  focus:
  - 长周期
  - 中周期
  - 短周期
  - 范式是否切换
  questions:
  - 当前矛盾主要在哪个时间尺度上？长期供给故事、中期工业周期，还是短期资金流？
  - 过去有效的经验（如铜跟中国 PMI、跟上证 50）是否仍成立，还是已范式切换？
  - 是否在「短期与长期都有分歧」的重要且紧急窗口？
  fallback: 长看供给约束与 capex 周期，中看全球工业产出，短看四类参与者博弈；勿用单一周期叙事覆盖全部。
