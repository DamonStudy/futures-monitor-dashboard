confirmation:
- 全球工业产出回升或制造业 PMI 反弹快于服务业
- 利率从高区间回落且软着陆叙事未被证伪
- 旺季下游带着改善预期备货，持仓与成交同步放大
- 结构性供给故事仍在（矿山扰动、再生铜不足以完全替代）
- 四类参与者中至少下游与贸易商行为与看多叙事一致
invalidation:
- 2008/2020 级系统性危机冲击实物需求
- 中美出现较长战略缓冲且战略囤货动机消退
- AI capex 预期显著下修且电力/电网叙事同步走弱
- 再生铜与矿山供给超预期释放，显性库存持续累积且基差走弱
- 范式切换被证伪：铜重新与中国地产周期单一绑定且数据持续超预期恶化
seasonal_notes:
- 关注铜旺季/淡季对下游点价与备货节奏的影响
- Q4 地缘、FOMC、重要政治会议常叠加波动
risk_factors:
- 南美政治（秘鲁、智利选举）与资源民族主义
- 美国铜关税与 Comex 库存战略化
- 油价冲击通过成本与联储路径影响铜
- 中国地产与竣工链尾部风险
- 净持仓与 CTA 动量在极端位置的反转
