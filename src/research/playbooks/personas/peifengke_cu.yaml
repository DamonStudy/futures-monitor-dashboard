  data_policy: reference_structure
  freshness: evergreen
- id: long_supply_demand
  title: 长周期·供给重于需求
  focus:
  - 激励价格
  - 勘探 capex
  - ESG
  - 大矿与小矿
  - 中国冶炼份额
  - 资源民族主义
  questions:
  - 价格上涨后是否有增产能力，还是仍卡在 incentive price 与 capex 周期？
  - 大矿扰动（南美政治、ESG）与小矿融资（利率）哪个更紧？
  - 是否警惕「十年后短缺数百万吨」的线性外推，而关注边际 30 万吨级缺口即可推价？
  fallback: 长期需求随工业化向上，但研究重点在「贵了我能不能扩产」；不相信极端 Net Zero 需求曲线，也相信电网/电力是更扎实的增量叙事。
