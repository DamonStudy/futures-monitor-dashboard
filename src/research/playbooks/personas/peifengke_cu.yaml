  data_policy: reference_structure
  freshness: evergreen
- id: structural_cyclical
  title: 结构性 vs 周期性
  focus:
  - 电网
  - AI 电力
  - 新能源
  - 关税囤货
  - 矿山扰动
  - 再生铜
  - 宏观降速
  questions:
  - 当前是「结构性顺风 + 周期性逆风」，还是两者共振/双杀？
  - 结构性需求：电网改造、AI/数据中心 capex、贸易搬运（关税）哪几条在生效？
  - 结构性供给：矿山扰动、ESG/勘探滞后、再生铜增量是否仍不足以覆盖需求增量？
  fallback: 铜价 = 结构性因素 + 周期性因素；2025 典型是结构性支撑抵消经济降速，2026 关注两者能否同向。
  chain: product
  tags:
