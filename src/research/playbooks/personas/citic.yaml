confirmation:
- 宏观流动性 narrative 与联储定价方向一致，且数据窗口未出现大幅预期差
- 品种级「供应—需求—库存—利润」四表与周观点方向同向
- 事件交易阶段，港口/现货/开工至少一条高频线验证故事
- 策略类逻辑（如累库做空）需库存数据确认矛盾回归
invalidation:
- 联储路径或地缘局势与当前 macro chain 假设相反且持续两周边际强化
- 库存、开工、到港等关键数据连续证伪产业故事
- 国内政策大幅超预期，使「空窗回归基本面」假设失效
- 事件缓和后仍用冲击叙事解释价格（逻辑滞后）
risk_factors:
- 地缘冲突升级或缓和的尾部风险
- 关税与经贸政策外溢
- 国内增量政策与经济修复不及预期
- 美联储货币政策偏离预期
- 历史经验失效（低波动环境下的突变）
