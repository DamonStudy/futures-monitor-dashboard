changelog:
- date: '2026-06-08'
  note: 自 29 篇已解析 PDF 蒸馏 20 条逻辑链；规范见 docs/knowledge-distillation.md
notes:
- 蒸馏规范见 docs/knowledge-distillation.md
- 同一作者（中信）下用 chain / boards / products / tags 区分板块逻辑，不拆多个 persona
- Playbook 只存思维；库存、利润等数字由 analyzer 实时提供
reasoning_chain:
- id: citic_macro_liquidity_regime
  chain: macro
  knowledge_type: framework
  data_policy: live_link
  freshness: semi_annual
  tags:
  - 宏观
  - 流动性
  - 软着陆
  - 大类配置
  title: 宏观组合：流动性 × 需求预期
  focus:
  - 美联储
  - 降息
  - 扩表
  - 软着陆
  - 美元指数
  - 大类轮动
  questions:
  - 当前交易主线是「流动性释放 + 需求预期上升」，还是「紧缩 repricing + 风险回避」？
  - 偏鸽议息/扩表阶段，是否相对利好贵金属、金融属性高的有色（铜铝）及外需敏感资产？
  - 国内重大会议落地后，是否从政策交易回归基本面，黑色等内需品种是否相对承压？
  analyzer_links:
  - macro_regime
  fallback: 先定流动性方向，再映射到商品；同一基本面数据在宽松与紧缩 narrative 下含义相反。
- id: citic_macro_fed_path
  chain: macro
  tags:
  - 宏观
  - 联储
  - 利率
  - 非农
  - ISM
  title: 联储路径与数据窗口
  focus:
  - 加息预期
  - 降息预期
  - 非农
  - PMI
  - 耐用品订单
  - 6月议息
  questions:
  - 就业、PMI、工厂订单是否一致强化「更高更久」利率预期？
  - 数据超预期后，贵金属、基本金属、铁矿等是否同步承压？
  - 议息会议与点阵图是否与市场定价出现预期差？
  analyzer_links:
  - macro_regime
  fallback: 中信宏观策略常把「联储收紧/放松计价」作为周内资产排序的第一变量。
  knowledge_type: framework
  data_policy: live_link
  freshness: semi_annual
- id: citic_macro_china_policy
  chain: macro
  tags:
  - 宏观
  - 中国政策
  - 政治局
  - 中央经济工作会议
  title: 国内政策基调与空窗期
  focus:
  - 逆周期
  - 跨周期
  - 十五五
  - 专项债
  - 外需
  - PMI
  questions:
  - 政策总量是持平、加码还是边际收敛？结构上是稳增长还是调结构优先？
  - 会议后是否进入政策空窗，商品是否回到各品种自身供需？
  - 制造业 PMI 产需、建筑业/服务业景气与专项债节奏是否支持当前商品方向？
  analyzer_links:
  - macro_regime
  fallback: 政策温和积极不等于所有商品同涨；关注「会议落地 → 基本面分化」阶段。
  knowledge_type: framework
  data_policy: live_link
  freshness: semi_annual
- id: citic_macro_oil_geopolitics
  chain: macro
  tags:
  - 宏观
  - 地缘
  - 油价
  - 通胀二阶效应
  title: 油价与地缘冲击
  focus:
  - 美伊
  - 霍尔木兹
  - 海峡通行
  - 能源通胀
  - 滞胀
  questions:
  - 冲突溢价是主导还是供需基本面主导？缓和预期是否带来溢价回吐？
  - 高油价是否通过生活成本、金融条件压制中下游利润与商品指数？
  - 能化进口依赖品种（甲醇等）是否出现「进口断档 vs 国产补充」的阶段性逻辑？
  fallback: 油价既是成本也是通胀；需区分事件交易阶段与库存/开工验证阶段。
  knowledge_type: framework
  data_policy: live_link
  freshness: semi_annual
